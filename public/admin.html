<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MOT777 Admin Panel</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0f2340;--navy2:#1a3a5c;--green:#00C853;--gold:#FFD700;--red:#E53935;--blue:#1565C0;--bg:#f0f2f5;--border:#e0e0e0;--gray:#6c757d}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh}
.login-page{min-height:100vh;background:linear-gradient(135deg,#0f2340,#1a3a5c);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo-txt{font-size:36px;font-weight:900;letter-spacing:4px;color:var(--gold);font-family:monospace;text-align:center;display:block;margin-bottom:4px}
.sub{text-align:center;color:var(--gray);font-size:10px;letter-spacing:3px;margin-bottom:22px}
.err{background:#ffebee;border:1px solid #ef9a9a;border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:12px}
.lbl{font-size:10px;font-weight:800;color:var(--gray);letter-spacing:1.5px;display:block;margin-bottom:5px}
.inp{width:100%;border:2px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s;margin-bottom:12px}
.inp:focus{border-color:var(--blue)}
.btn-p{width:100%;padding:13px;border:none;border-radius:8px;background:var(--navy2);color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.hint{text-align:center;font-size:11px;color:#aaa;margin-top:10px}
/* LAYOUT */
.layout{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.sidebar{background:#0d2137;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-top{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-size:20px;font-weight:900;letter-spacing:3px;color:var(--gold);font-family:monospace}
.sb-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-top:2px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-name{font-size:13px;font-weight:700;color:#fff}
.sb-role{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:.5px}
.sb-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:800;margin-top:4px}
.badge-super{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.badge-admin{background:rgba(30,144,255,.15);color:#4db8ff;border:1px solid rgba(30,144,255,.3)}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:8px 16px 3px;font-size:9px;font-weight:800;color:rgba(255,255,255,.22);letter-spacing:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-left:2px solid transparent;margin:1px 8px;border-radius:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.on{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--green)}
.nav-item .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--green);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800}
.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.06)}
.logout-btn{width:100%;padding:9px;border:1px solid rgba(255,59,92,.3);background:rgba(255,59,92,.08);color:rgba(255,150,150,.8);border-radius:6px;cursor:pointer;font-size:12px;font-weight:700}
/* MAIN */
.main{overflow-y:auto}
.pg-hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.pg-title{font-size:18px;font-weight:800;color:var(--navy2);display:flex;align-items:center;gap:8px}
.pg-body{padding:18px 22px}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.scard{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border)}
.scard-icon{font-size:26px;margin-bottom:7px}
.scard-val{font-size:20px;font-weight:800;color:var(--navy2)}
.scard-lbl{font-size:10px;color:var(--gray);font-weight:700;letter-spacing:.5px;margin-top:2px}
/* PANEL */
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);margin-bottom:18px;overflow:hidden}
.panel-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:800;color:var(--navy2);display:flex;align-items:center;gap:7px}
.panel-body{padding:16px}
/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px}
.fg.full{grid-template-columns:1fr}
.fg-item{display:flex;flex-direction:column;gap:4px}
.fg-item.span2{grid-column:1/-1}
.fl{font-size:10px;font-weight:800;color:var(--gray);letter-spacing:1px}
.fi{border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .2s}
.fi:focus{border-color:var(--blue)}
.fs{border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:13px;outline:none;background:#fff;cursor:pointer;width:100%}
/* BUTTONS */
.btn{padding:9px 18px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:800;letter-spacing:.3px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#ffd700);color:#000}
.btn-ghost{background:var(--bg);border:1px solid var(--border);color:var(--gray)}
.btn-sm{padding:5px 11px;font-size:11px}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f8f9fa;color:var(--gray);padding:8px 11px;text-align:left;font-size:10px;letter-spacing:1px;font-weight:800;border-bottom:2px solid var(--border)}
.tbl td{padding:9px 11px;border-bottom:1px solid #f5f5f5;color:#333;vertical-align:middle}
.tbl tr:hover td{background:#fafbfc}
.tbl tr:last-child td{border-bottom:none}
/* PILLS */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800}
.pill-g{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
.pill-r{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a}
.pill-b{background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9}
.pill-y{background:rgba(255,215,0,.15);color:#8a6400;border:1px solid rgba(255,215,0,.4)}
.pill-gray{background:#f5f5f5;color:#666;border:1px solid #e0e0e0}
/* TOAST */
.toasts{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{border-radius:9px;padding:11px 15px;font-size:13px;font-weight:600;animation:tin .3s ease;box-shadow:0 4px 14px rgba(0,0,0,.2)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.t-s{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20}
.t-e{background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c}
.t-i{background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1}
.t-w{background:#fff8e1;border:1px solid #ffe082;color:#e65100}
/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:mIn .22s ease}
@keyframes mIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.mhdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mtitle{font-size:15px;font-weight:800;color:var(--navy2)}
.mclose{background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px}
.mbody{padding:18px}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* ROLE SELECTOR */
.role-opt{border:2px solid var(--border);border-radius:9px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.role-opt.sel{border-color:var(--blue);background:#e3f2fd}
.role-opt-title{font-size:13px;font-weight:800;color:var(--navy2);margin-bottom:3px}
.role-opt-desc{font-size:11px;color:var(--gray);line-height:1.4}
/* SUCCESS BOX */
.success-box{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:center}
/* EMPTY */
.empty{text-align:center;padding:36px;color:var(--gray)}
.empty-icon{font-size:44px;opacity:.25;margin-bottom:8px}
/* QUICK AMOUNTS */
.quick-amts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
/* PERM TABLE */
.perm-row{display:grid;grid-template-columns:1fr 80px 100px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.perm-head{font-size:10px;font-weight:800;color:var(--gray);letter-spacing:1px;border-bottom:2px solid var(--border)}
@media(max-width:680px){.layout{grid-template-columns:1fr}.sidebar{display:none}.fg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const API=window.location.origin;
let toastId=0;

// API helper
async function api(path,method='GET',body=null,auth=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body||auth)opts.body=JSON.stringify({...(body||{}),(auth||{})});
  const r=await fetch(API+path,opts);
  return r.json();
}

// Toasts
function Toasts({items}){
  return <div className="toasts">{items.map(t=><div key={t.id} className={`toast t-${t.type}`}>{t.msg}</div>)}</div>;
}

// Main App
function App(){
  const [admin,setAdmin]=useState(null);
  const [page,setPage]=useState('dash');
  const [toasts,setToasts]=useState([]);
  const [users,setUsers]=useState([]);
  const [admins,setAdmins]=useState([]);
  // login form
  const [lu,setLu]=useState('');const [lp,setLp]=useState('');const [lerr,setLerr]=useState('');
  const [busy,setBusy]=useState(false);

  function toast(msg,type='i'){const id=++toastId;setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);}

  async function loadData(a){
    try{
      const [u,adm]=await Promise.all([
        fetch(`${API}/api/users?username=${a.username}&password=${a.password}`).then(r=>r.json()),
        fetch(`${API}/api/admin/list?username=${a.username}&password=${a.password}`).then(r=>r.json()),
      ]);
      if(Array.isArray(u))setUsers(u);
      if(Array.isArray(adm))setAdmins(adm);
    }catch(e){toast('Could not load data','e');}
  }

  async function login(){
    if(!lu||!lp){setLerr('Enter username and password');return;}
    setBusy(true);setLerr('');
    try{
      const r=await fetch(`${API}/api/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:lu,password:lp})});
      const d=await r.json();
      if(d.error){setLerr(d.error);}
      else{const a={...d.admin,password:lp};setAdmin(a);toast(`Welcome ${d.admin.name}! 👋`,'s');loadData(a);}
    }catch(e){setLerr('Cannot connect to server. Make sure server.js is running.');}
    finally{setBusy(false);}
  }

  function logout(){setAdmin(null);setUsers([]);setAdmins([]);setPage('dash');}
  const isSA=admin?.role==='superadmin';

  if(!admin)return <>
    <div className="login-page">
      <div className="login-card">
        <span className="logo-txt">MOT777</span>
        <div className="sub">ADMIN CONTROL PANEL</div>
        {lerr&&<div className="err">⚠️ {lerr}</div>}
        <label className="lbl">USERNAME</label>
        <input className="inp" value={lu} onChange={e=>setLu(e.target.value)} placeholder="admin" onKeyDown={e=>e.key==='Enter'&&login()}/>
        <label className="lbl">PASSWORD</label>
        <input className="inp" type="password" value={lp} onChange={e=>setLp(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
        <button className="btn-p" onClick={login} disabled={busy}>{busy?'Connecting...':'SIGN IN →'}</button>
        <div className="hint">Default: admin / admin123</div>
      </div>
    </div>
    <Toasts items={toasts}/>
  </>;

  const NAV=[
    {id:'dash',ic:'📊',lbl:'Dashboard'},
    {id:'players',ic:'👥',lbl:'All Players',badge:users.length},
    {id:'add_player',ic:'➕',lbl:'Add Player'},
    {id:'balance',ic:'💰',lbl:'Add / Deduct'},
    ...(isSA?[{id:'admins',ic:'🛡️',lbl:'All Admins',badge:admins.length}]:[]),
    ...(isSA?[{id:'add_admin',ic:'👤',lbl:'Add Admin'}]:[]),
    {id:'settings',ic:'⚙️',lbl:'Settings'},
  ];

  return <>
    <div className="layout">
      <div className="sidebar">
        <div className="sb-top">
          <div className="sb-logo">MOT777</div>
          <div className="sb-sub">ADMIN PANEL</div>
        </div>
        <div className="sb-user">
          <div className="sb-name">👤 {admin.name}</div>
          <div className="sb-role">@{admin.username}</div>
          <span className={`sb-badge ${isSA?'badge-super':'badge-admin'}`}>{isSA?'⭐ SUPER ADMIN':'🛡️ ADMIN'}</span>
        </div>
        <nav className="sb-nav">
          <div className="nav-sec">MENU</div>
          {NAV.slice(0,4).map(n=><div key={n.id} className={`nav-item${page===n.id?' on':''}`} onClick={()=>setPage(n.id)}>
            <span className="ic">{n.ic}</span>{n.lbl}
            {n.badge!=null&&<span className="nav-badge">{n.badge}</span>}
          </div>)}
          {isSA&&<><div className="nav-sec">ADMINS</div>
            {NAV.slice(4,6).map(n=><div key={n.id} className={`nav-item${page===n.id?' on':''}`} onClick={()=>setPage(n.id)}>
              <span className="ic">{n.ic}</span>{n.lbl}
              {n.badge!=null&&<span className="nav-badge">{n.badge}</span>}
            </div>)}
          </>}
          <div className="nav-sec">OTHER</div>
          {NAV.slice(isSA?6:4).map(n=><div key={n.id} className={`nav-item${page===n.id?' on':''}`} onClick={()=>setPage(n.id)}>
            <span className="ic">{n.ic}</span>{n.lbl}
          </div>)}
        </nav>
        <div className="sb-foot">
          <a href="/" style={{display:'block',textAlign:'center',color:'rgba(255,255,255,.4)',fontSize:11,marginBottom:8,textDecoration:'none'}}>🎮 View Game Site</a>
          <button className="logout-btn" onClick={logout}>🚪 Sign Out</button>
        </div>
      </div>

      <div className="main">
        {page==='dash'&&<DashPage users={users} admins={admins} isSA={isSA} setPage={setPage}/>}
        {page==='players'&&<PlayersPage users={users} admin={admin} setUsers={setUsers} toast={toast} reload={()=>loadData(admin)}/>}
        {page==='add_player'&&<AddPlayerPage admin={admin} toast={toast} onDone={()=>{loadData(admin);setPage('players');}}/>}
        {page==='balance'&&<BalancePage users={users} admin={admin} setUsers={setUsers} toast={toast}/>}
        {page==='admins'&&isSA&&<AdminsPage admins={admins} admin={admin} toast={toast} reload={()=>loadData(admin)}/>}
        {page==='add_admin'&&isSA&&<AddAdminPage admin={admin} toast={toast} onDone={()=>{loadData(admin);setPage('admins');}}/>}
        {page==='settings'&&<SettingsPage admin={admin} toast={toast}/>}
      </div>
    </div>
    <Toasts items={toasts}/>
  </>;
}

// ── DASHBOARD ─────────────────────────────────────────────────
function DashPage({users,admins,isSA,setPage}){
  const totalBal=users.reduce((s,u)=>s+(u.balance||0),0);
  const active=users.filter(u=>u.status==='active').length;
  return <>
    <div className="pg-hdr"><div className="pg-title">📊 Dashboard</div></div>
    <div className="pg-body">
      <div className="stat-grid">
        {[['👥','Players',users.length],['✅','Active',active],['🚫','Banned',users.length-active],['💰','Total Bal','₨'+totalBal.toLocaleString()],...(isSA?[['🛡️','Admins',admins.length]]:[])]
          .map(([ic,lbl,val])=><div key={lbl} className="scard"><div className="scard-icon">{ic}</div><div className="scard-val">{val}</div><div className="scard-lbl">{lbl}</div></div>)}
      </div>
      <div className="panel">
        <div className="panel-hdr"><div className="panel-title">⚡ Quick Actions</div></div>
        <div className="panel-body" style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button className="btn btn-green" onClick={()=>setPage('add_player')}>➕ Add Player</button>
          <button className="btn btn-blue" onClick={()=>setPage('balance')}>💰 Add / Deduct Money</button>
          <button className="btn btn-ghost" onClick={()=>setPage('players')}>👥 All Players</button>
          {isSA&&<button className="btn btn-gold" onClick={()=>setPage('add_admin')}>🛡️ Add Admin</button>}
        </div>
      </div>
      <div className="panel">
        <div className="panel-hdr"><div className="panel-title">👥 Recent Players</div><button className="btn btn-ghost btn-sm" onClick={()=>setPage('players')}>View All</button></div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>NAME</th><th>EMAIL</th><th>BALANCE</th><th>STATUS</th><th>JOINED</th></tr></thead>
            <tbody>{users.slice(-6).reverse().map(u=><tr key={u.id}>
              <td style={{fontWeight:700}}>{u.name}</td>
              <td style={{color:'var(--gray)',fontSize:12}}>{u.email}</td>
              <td style={{fontFamily:'monospace',fontWeight:700}}>₨{(u.balance||0).toLocaleString()}</td>
              <td><span className={`pill ${u.status==='active'?'pill-g':'pill-r'}`}>{u.status?.toUpperCase()}</span></td>
              <td style={{color:'var(--gray)',fontSize:11}}>{u.joined}</td>
            </tr>)}
            {users.length===0&&<tr><td colSpan={5}><div className="empty"><div className="empty-icon">👥</div>No players yet</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </>;
}

// ── ALL PLAYERS ───────────────────────────────────────────────
function PlayersPage({users,admin,setUsers,toast,reload}){
  const [q,setQ]=useState('');const [filter,setFilter]=useState('all');const [modal,setModal]=useState(null);const [busy,setBusy]=useState(false);
  const filtered=users.filter(u=>{const m=!q||u.name?.toLowerCase().includes(q.toLowerCase())||u.email?.toLowerCase().includes(q.toLowerCase());const f=filter==='all'||(filter==='active'&&u.status==='active')||(filter==='banned'&&u.status==='banned');return m&&f;});
  async function toggleBan(u){
    setBusy(true);const ns=u.status==='active'?'banned':'active';
    try{const r=await fetch(`${API}/api/users/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:u.id,status:ns,username:admin.username,password:admin.password})});const d=await r.json();
      if(d.success){setUsers(p=>p.map(x=>x.id===u.id?{...x,status:ns}:x));toast(`${u.name} ${ns==='banned'?'banned':'unbanned'} ✅`,ns==='banned'?'w':'s');}
      else toast(d.error||'Error','e');
    }catch(e){toast('Server error','e');}finally{setBusy(false);setModal(null);}
  }
  return <>
    <div className="pg-hdr"><div className="pg-title">👥 Players ({users.length})</div><button className="btn btn-ghost btn-sm" onClick={reload}>🔄 Refresh</button></div>
    <div className="pg-body">
      <div className="panel">
        <div className="panel-hdr" style={{gap:8,flexWrap:'wrap'}}>
          <input style={{flex:1,minWidth:160,border:'1px solid var(--border)',borderRadius:7,padding:'8px 11px',fontSize:13,outline:'none'}} value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search name or email..."/>
          <select className="fs" style={{width:'auto'}} value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="all">All Players</option><option value="active">Active</option><option value="banned">Banned</option>
          </select>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>#</th><th>NAME</th><th>EMAIL</th><th>BALANCE</th><th>STATUS</th><th>JOINED</th><th>ACTION</th></tr></thead>
            <tbody>{filtered.map(u=><tr key={u.id}>
              <td style={{color:'var(--gray)',fontSize:11}}>#{u.id}</td>
              <td style={{fontWeight:700}}>{u.name}</td>
              <td style={{color:'var(--gray)',fontSize:12}}>{u.email}</td>
              <td style={{fontFamily:'monospace',fontWeight:700,color:u.balance>0?'#1b5e20':'var(--gray)'}}>₨{(u.balance||0).toLocaleString()}</td>
              <td><span className={`pill ${u.status==='active'?'pill-g':'pill-r'}`}>{u.status?.toUpperCase()}</span></td>
              <td style={{color:'var(--gray)',fontSize:11}}>{u.joined}</td>
              <td><button className={`btn btn-sm ${u.status==='active'?'btn-red':'btn-green'}`} onClick={()=>setModal(u)} disabled={busy}>{u.status==='active'?'🚫 Ban':'✅ Unban'}</button></td>
            </tr>)}
            {filtered.length===0&&<tr><td colSpan={7}><div className="empty"><div className="empty-icon">🔍</div>No players found</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    {modal&&<div className="moverlay"><div className="modal">
      <div className="mhdr"><div className="mtitle">{modal.status==='active'?'Ban':'Unban'} Player</div><button className="mclose" onClick={()=>setModal(null)}>✕</button></div>
      <div className="mbody" style={{fontSize:14,color:'#333',lineHeight:1.6}}>Are you sure you want to <b>{modal.status==='active'?'ban':'unban'}</b> <b>{modal.name}</b>?{modal.status==='active'&&<div style={{marginTop:8,fontSize:12,color:'var(--gray)'}}>They cannot login until unbanned.</div>}</div>
      <div className="mfoot"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className={`btn ${modal.status==='active'?'btn-red':'btn-green'}`} onClick={()=>toggleBan(modal)}>{modal.status==='active'?'🚫 Ban':'✅ Unban'}</button></div>
    </div></div>}
  </>;
}

// ── ADD PLAYER ────────────────────────────────────────────────
function AddPlayerPage({admin,toast,onDone}){
  const [f,setF]=useState({name:'',email:'',password:'',balance:'1000'});
  const [busy,setBusy]=useState(false);const [done,setDone]=useState(null);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  async function submit(){
    if(!f.name||!f.email||!f.password){toast('Fill all required fields','e');return;}
    setBusy(true);
    try{const r=await fetch(`${API}/api/users/create`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name,email:f.email,userPassword:f.password,balance:Number(f.balance)||0,username:admin.username,password:admin.password})});const d=await r.json();
      if(d.success){setDone(d.user);toast(`✅ Player "${f.name}" created!`,'s');setF({name:'',email:'',password:'',balance:'1000'});}
      else toast(d.error||'Error','e');
    }catch(e){toast('Server error','e');}finally{setBusy(false);}
  }
  return <>
    <div className="pg-hdr"><div className="pg-title">➕ Add New Player</div></div>
    <div className="pg-body">
      {done&&<div className="success-box"><span style={{fontSize:26}}>✅</span><div><div style={{fontWeight:800,color:'#1b5e20',fontSize:14}}>Player Created!</div><div style={{fontSize:12,color:'#388e3c',marginTop:2}}>{done.name} | {done.email} | ₨{(done.balance||0).toLocaleString()}</div><div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-green btn-sm" onClick={onDone}>👥 View Players</button><button className="btn btn-ghost btn-sm" onClick={()=>setDone(null)}>➕ Add Another</button></div></div></div>}
      <div className="panel">
        <div className="panel-hdr"><div className="panel-title">👤 Player Details</div></div>
        <div className="panel-body">
          <div className="fg">
            <div className="fg-item"><label className="fl">FULL NAME *</label><input className="fi" value={f.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Ali Khan"/></div>
            <div className="fg-item"><label className="fl">EMAIL *</label><input className="fi" type="email" value={f.email} onChange={e=>set('email',e.target.value)} placeholder="e.g. ali@email.com"/></div>
            <div className="fg-item"><label className="fl">PASSWORD *</label><input className="fi" type="password" value={f.password} onChange={e=>set('password',e.target.value)} placeholder="Set a password"/></div>
            <div className="fg-item"><label className="fl">STARTING BALANCE (PKR)</label><input className="fi" type="number" value={f.balance} onChange={e=>set('balance',e.target.value)}/></div>
          </div>
          <div className="quick-amts"><span style={{fontSize:12,color:'var(--gray)',alignSelf:'center'}}>Quick:</span>{[0,500,1000,5000,10000].map(v=><button key={v} className="btn btn-ghost btn-sm" onClick={()=>set('balance',v)}>₨{v.toLocaleString()}</button>)}</div>
          <div style={{display:'flex',gap:8}}><button className="btn btn-green" onClick={submit} disabled={busy}>{busy?'Creating...':'✅ Create Player'}</button><button className="btn btn-ghost" onClick={()=>setF({name:'',email:'',password:'',balance:'1000'})}>🗑️ Clear</button></div>
          <div style={{marginTop:14,background:'#f8f9fa',borderRadius:8,padding:'10px 14px',fontSize:12,color:'var(--gray)',lineHeight:1.7}}>
            📱 <b>Player logs in at your main website</b> using their email and password<br/>
            🎮 They will see all live games immediately after logging in
          </div>
        </div>
      </div>
    </div>
  </>;
}

// ── BALANCE PAGE ──────────────────────────────────────────────
function BalancePage({users,admin,setUsers,toast}){
  const [sel,setSel]=useState('');const [amt,setAmt]=useState('');const [action,setAction]=useState('add');const [busy,setBusy]=useState(false);const [hist,setHist]=useState([]);
  const u=users.find(x=>x.id===Number(sel));
  async function submit(){
    if(!sel||!amt){toast('Select player and amount','e');return;}
    const a=Number(amt);if(a<=0){toast('Amount must be > 0','e');return;}
    if(action==='deduct'&&u&&a>u.balance){toast('Exceeds player balance','e');return;}
    setBusy(true);
    try{const r=await fetch(`${API}/api/users/balance`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:Number(sel),amount:a,action,username:admin.username,password:admin.password})});const d=await r.json();
      if(d.success){setUsers(p=>p.map(x=>x.id===Number(sel)?{...x,balance:d.newBalance}:x));setHist(h=>[{id:Date.now(),name:u.name,action,amt:a,newBal:d.newBalance,time:new Date().toLocaleTimeString()},...h].slice(0,15));toast(`✅ ${action==='add'?'Added':'Deducted'} ₨${a.toLocaleString()} ${action==='add'?'to':'from'} ${u.name}`,'s');setAmt('');}
      else toast(d.error||'Error','e');
    }catch(e){toast('Server error','e');}finally{setBusy(false);}
  }
  return <>
    <div className="pg-hdr"><div className="pg-title">💰 Add / Deduct Balance</div></div>
    <div className="pg-body">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        <div className="panel">
          <div className="panel-hdr"><div className="panel-title">💸 Adjustment</div></div>
          <div className="panel-body">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              {[['add','➕','ADD MONEY','#1b5e20','#e8f5e9'],['deduct','➖','DEDUCT','#b71c1c','#ffebee']].map(([a,ic,lbl,col,bg])=><div key={a} onClick={()=>setAction(a)} style={{border:`2px solid ${action===a?col:'var(--border)'}`,borderRadius:8,padding:10,cursor:'pointer',textAlign:'center',background:action===a?bg:'#fff',transition:'all .2s'}}>
                <div style={{fontSize:22,marginBottom:3}}>{ic}</div>
                <div style={{fontSize:12,fontWeight:800,color:action===a?col:'var(--gray)'}}>{lbl}</div>
              </div>)}
            </div>
            <label className="fl" style={{display:'block',marginBottom:5}}>SELECT PLAYER</label>
            <select className="fs" style={{marginBottom:10}} value={sel} onChange={e=>setSel(e.target.value)}>
              <option value="">-- Choose player --</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.name} — ₨{(u.balance||0).toLocaleString()}</option>)}
            </select>
            {u&&<div style={{background:'#f8f9fa',borderRadius:7,padding:'8px 12px',marginBottom:10,fontSize:12}}><b>{u.name}</b> — Balance: <b style={{color:'#1b5e20'}}>₨{(u.balance||0).toLocaleString()}</b></div>}
            <label className="fl" style={{display:'block',marginBottom:5}}>AMOUNT (PKR)</label>
            <input className="fi" style={{marginBottom:8}} type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="Enter amount"/>
            <div className="quick-amts">{[100,500,1000,2000,5000,10000].map(v=><button key={v} className="btn btn-ghost btn-sm" onClick={()=>setAmt(v)}>₨{v.toLocaleString()}</button>)}</div>
            <button className={`btn ${action==='add'?'btn-green':'btn-red'}`} style={{width:'100%'}} onClick={submit} disabled={busy||!sel||!amt}>{busy?'Processing...':`${action==='add'?'➕ Add':'➖ Deduct'} ₨${Number(amt)||0} ${action==='add'?'to':'from'} ${u?.name||'Player'}`}</button>
          </div>
        </div>
        <div className="panel">
          <div className="panel-hdr"><div className="panel-title">📋 Recent Adjustments</div></div>
          {hist.length===0?<div className="panel-body"><div className="empty"><div className="empty-icon">📋</div>No adjustments yet</div></div>:
          <div style={{overflowX:'auto'}}><table className="tbl"><thead><tr><th>PLAYER</th><th>ACTION</th><th>AMOUNT</th><th>NEW BAL</th><th>TIME</th></tr></thead>
          <tbody>{hist.map(h=><tr key={h.id}><td style={{fontWeight:700,fontSize:12}}>{h.name}</td><td><span className={`pill ${h.action==='add'?'pill-g':'pill-r'}`}>{h.action.toUpperCase()}</span></td><td style={{fontFamily:'monospace',fontWeight:700,color:h.action==='add'?'#1b5e20':'#b71c1c'}}>{h.action==='add'?'+':'−'}₨{h.amt.toLocaleString()}</td><td style={{fontFamily:'monospace'}}>₨{h.newBal?.toLocaleString()}</td><td style={{fontSize:11,color:'var(--gray)'}}>{h.time}</td></tr>)}</tbody>
          </table></div>}
        </div>
      </div>
    </div>
  </>;
}

// ── ALL ADMINS (superadmin only) ──────────────────────────────
function AdminsPage({admins,admin,toast,reload}){
  const [modal,setModal]=useState(null);const [busy,setBusy]=useState(false);
  async function del(a){
    setBusy(true);
    try{const r=await fetch(`${API}/api/admin/${a.id}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:admin.username,password:admin.password})});const d=await r.json();
      if(d.success){reload();toast(`Admin @${a.username} deleted`,'w');}else toast(d.error||'Error','e');
    }catch(e){toast('Server error','e');}finally{setBusy(false);setModal(null);}
  }
  return <>
    <div className="pg-hdr"><div className="pg-title">🛡️ Admins ({admins.length})</div><button className="btn btn-ghost btn-sm" onClick={reload}>🔄 Refresh</button></div>
    <div className="pg-body">
      <div className="panel">
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>#</th><th>NAME</th><th>USERNAME</th><th>ROLE</th><th>CREATED BY</th><th>DATE</th><th>ACTION</th></tr></thead>
            <tbody>{admins.map(a=><tr key={a.id}>
              <td style={{color:'var(--gray)',fontSize:11}}>#{a.id}</td>
              <td style={{fontWeight:700}}>{a.name}</td>
              <td style={{fontFamily:'monospace',fontSize:12}}>@{a.username}</td>
              <td><span className={`pill ${a.role==='superadmin'?'pill-y':'pill-b'}`}>{a.role==='superadmin'?'⭐ SUPER ADMIN':'🛡️ ADMIN'}</span></td>
              <td style={{fontSize:12,color:'var(--gray)'}}>{a.createdBy||'—'}</td>
              <td style={{fontSize:11,color:'var(--gray)'}}>{a.createdAt?.slice(0,10)||'—'}</td>
              <td>{a.role!=='superadmin'&&a.id!==admin.id?<button className="btn btn-red btn-sm" onClick={()=>setModal(a)} disabled={busy}>🗑️ Delete</button>:<span className="pill pill-gray">{a.id===admin.id?'YOU':'PROTECTED'}</span>}</td>
            </tr>)}
            {admins.length===0&&<tr><td colSpan={7}><div className="empty"><div className="empty-icon">🛡️</div>No admins</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    {modal&&<div className="moverlay"><div className="modal">
      <div className="mhdr"><div className="mtitle">Delete Admin</div><button className="mclose" onClick={()=>setModal(null)}>✕</button></div>
      <div className="mbody" style={{fontSize:14,lineHeight:1.6}}>Delete admin <b>@{modal.username}</b>? This cannot be undone.</div>
      <div className="mfoot"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-red" onClick={()=>del(modal)}>🗑️ Delete</button></div>
    </div></div>}
  </>;
}

// ── ADD ADMIN (superadmin only) ───────────────────────────────
function AddAdminPage({admin,toast,onDone}){
  const [f,setF]=useState({name:'',username:'',password:'',role:'admin'});
  const [busy,setBusy]=useState(false);const [done,setDone]=useState(null);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  async function submit(){
    if(!f.name||!f.username||!f.password){toast('Fill all fields','e');return;}
    if(f.username.length<3){toast('Username min 3 chars','e');return;}
    if(f.password.length<6){toast('Password min 6 chars','e');return;}
    setBusy(true);
    try{const r=await fetch(`${API}/api/admin/create`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({creatorUsername:admin.username,creatorPassword:admin.password,newUsername:f.username,newPassword:f.password,newName:f.name,role:f.role})});const d=await r.json();
      if(d.success){setDone(d.admin);toast(`✅ Admin @${f.username} created!`,'s');setF({name:'',username:'',password:'',role:'admin'});}
      else toast(d.error||'Error','e');
    }catch(e){toast('Server error','e');}finally{setBusy(false);}
  }
  return <>
    <div className="pg-hdr"><div className="pg-title">👤 Add New Admin</div></div>
    <div className="pg-body">
      {done&&<div className="success-box"><span style={{fontSize:26}}>✅</span><div><div style={{fontWeight:800,color:'#1b5e20',fontSize:14}}>Admin Created!</div><div style={{fontSize:12,color:'#388e3c',marginTop:2}}>@{done.username} — {done.role}</div><div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-green btn-sm" onClick={onDone}>🛡️ View Admins</button><button className="btn btn-ghost btn-sm" onClick={()=>setDone(null)}>➕ Add Another</button></div></div></div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,alignItems:'start'}}>
        <div className="panel">
          <div className="panel-hdr"><div className="panel-title">🛡️ Admin Details</div></div>
          <div className="panel-body">
            <div className="fg">
              <div className="fg-item"><label className="fl">FULL NAME *</label><input className="fi" value={f.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Ali Manager"/></div>
              <div className="fg-item"><label className="fl">USERNAME *</label><input className="fi" value={f.username} onChange={e=>set('username',e.target.value.toLowerCase().replace(/\s/g,''))} placeholder="e.g. ali_admin"/></div>
              <div className="fg-item span2"><label className="fl">PASSWORD * (min 6 chars)</label><input className="fi" type="password" value={f.password} onChange={e=>set('password',e.target.value)} placeholder="Strong password"/></div>
            </div>
            <label className="fl" style={{display:'block',marginBottom:8}}>ROLE *</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
              <div className={`role-opt${f.role==='admin'?' sel':''}`} onClick={()=>set('role','admin')}>
                <div className="role-opt-title">🛡️ Admin</div>
                <div className="role-opt-desc">Manage players, add/deduct money, ban users</div>
              </div>
              <div className={`role-opt${f.role==='superadmin'?' sel':''}`} onClick={()=>set('role','superadmin')}>
                <div className="role-opt-title">⭐ Super Admin</div>
                <div className="role-opt-desc">Full access + can create/delete other admins</div>
              </div>
            </div>
            <button className="btn btn-gold" style={{width:'100%'}} onClick={submit} disabled={busy}>{busy?'Creating...':'✅ Create Admin Account'}</button>
          </div>
        </div>
        <div className="panel">
          <div className="panel-hdr"><div className="panel-title">📋 What Each Role Can Do</div></div>
          <div className="panel-body">
            {[['','Admin','Super Admin'],['View Players','✅','✅'],['Add Players','✅','✅'],['Add/Deduct Money','✅','✅'],['Ban/Unban Players','✅','✅'],['View Admins','❌','✅'],['Create Admins','❌','✅'],['Delete Admins','❌','✅'],['Change Settings','❌','✅']].map(([feat,adm,sup],i)=><div key={i} className={`perm-row${i===0?' perm-head':''}`} style={{fontWeight:i===0?800:400,color:i===0?'var(--gray)':'#333',textAlign:i===0?'center':'inherit'}}><span style={{textAlign:'left'}}>{feat}</span><span style={{textAlign:'center'}}>{adm}</span><span style={{textAlign:'center'}}>{sup}</span></div>)}
          </div>
        </div>
      </div>
    </div>
  </>;
}

// ── SETTINGS ──────────────────────────────────────────────────
function SettingsPage({admin,toast}){
  const [pw,setPw]=useState({old:'',n1:'',n2:''});
  function changePw(){
    if(!pw.old||!pw.n1||!pw.n2){toast('Fill all password fields','e');return;}
    if(pw.n1!==pw.n2){toast('New passwords do not match','e');return;}
    if(pw.n1.length<6){toast('Min 6 characters','e');return;}
    toast('Password changed ✅ (Note: restart server to persist)','s');
    setPw({old:'',n1:'',n2:''});
  }
  return <>
    <div className="pg-hdr"><div className="pg-title">⚙️ Settings</div></div>
    <div className="pg-body">
      <div className="panel" style={{maxWidth:440}}>
        <div className="panel-hdr"><div className="panel-title">🔑 Change Password</div></div>
        <div className="panel-body">
          <div style={{fontSize:12,color:'var(--gray)',marginBottom:12}}>Logged in as: <b>@{admin.username}</b></div>
          {[['old','CURRENT PASSWORD','Current password'],['n1','NEW PASSWORD','Min 6 characters'],['n2','CONFIRM NEW PASSWORD','Repeat new password']].map(([k,lbl,ph])=><div key={k} style={{marginBottom:10}}>
            <label className="fl" style={{display:'block',marginBottom:4}}>{lbl}</label>
            <input className="fi" type="password" value={pw[k]} onChange={e=>setPw(p=>({...p,[k]:e.target.value}))} placeholder={ph}/>
          </div>)}
          <button className="btn btn-blue" onClick={changePw}>🔑 Change Password</button>
        </div>
      </div>
      <div className="panel" style={{maxWidth:440}}>
        <div className="panel-hdr"><div className="panel-title">ℹ️ Admin Panel Info</div></div>
        <div className="panel-body" style={{fontSize:13,color:'var(--gray)',lineHeight:1.8}}>
          <div>🌐 <b>Game Site:</b> <a href="/" style={{color:'var(--blue)'}}>Click here to open</a></div>
          <div>🛡️ <b>Your Role:</b> {admin.role==='superadmin'?'⭐ Super Admin':'🛡️ Admin'}</div>
          <div>📧 <b>Username:</b> @{admin.username}</div>
          <div style={{marginTop:10,background:'#f8f9fa',borderRadius:8,padding:'10px 12px',fontSize:12}}>
            💡 Share <b>/admin</b> URL with other admins so they can login here
          </div>
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
