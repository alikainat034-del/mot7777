<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MOT777 Live</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--green:#00C853;--teal:#00897B;--dark:#0d1f0d;--back:#1565C0;--back-lt:#BBDEFB;--lay:#C62828;--lay-lt:#FFCDD2;--gold:#FFD700;--red:#E53935;--navy:#1a3a5c}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f0f0;min-height:100vh;overflow-x:hidden}
/* TOPBAR */
.topbar{background:linear-gradient(90deg,#1a3a5c,#0d2137);color:#fff;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.tb-logo{font-weight:900;font-size:22px;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.tb-bal{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 12px;font-size:13px;font-weight:700}
.tb-btns{display:flex;gap:6px;align-items:center}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s}
.tb-btn:hover{background:rgba(255,255,255,.1)}
.tb-dep{background:var(--green);border-color:var(--green)}
.ws-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.ws-on{background:rgba(0,200,83,.2);color:#00e676;border:1px solid rgba(0,200,83,.3)}
.ws-off{background:rgba(255,59,92,.2);color:#ff5252;border:1px solid rgba(255,59,92,.3)}
/* NAV MODES */
.mode-nav{background:#0d2137;display:flex;overflow-x:auto;flex-shrink:0}
.mode-nav::-webkit-scrollbar{height:0}
.mn{padding:9px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.mn:hover{color:#fff}
.mn.on{color:var(--gold);border-bottom-color:var(--gold)}
.mn.ex-on{color:#4db8ff;border-bottom-color:#4db8ff}
/* LOBBY TABS */
.lobby-tabs{background:#1a3a5c;padding:7px 10px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0}
.lobby-tabs::-webkit-scrollbar{height:0}
.lt{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .2s;flex-shrink:0}
.lt.on{background:var(--green);border-color:var(--green);color:#fff}
/* LOBBY GRID */
.lobby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:0;background:#ddd}
.game-tile{background:#fff;cursor:pointer;border:1px solid #e0e0e0;transition:all .2s;position:relative}
.game-tile:hover{box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:2}
.gt-art{height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.gt-play{position:absolute;width:44px;height:44px;background:rgba(0,200,83,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;opacity:0;transition:opacity .2s}
.game-tile:hover .gt-play{opacity:1}
.gt-name{padding:8px 10px 10px;text-align:center;font-size:13px;font-weight:700;color:#00897B}
/* GAME SCREEN */
.game-screen{display:flex;flex-direction:column;height:calc(100vh - 95px);overflow:hidden;background:#f0f0f0}
.gm-hdr{background:#1a3a5c;color:#fff;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gm-hdr-left{display:flex;align-items:center;gap:10px}
.gm-id{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5}
.gm-id b{font-size:13px;color:#fff;display:block}
/* TIMER */
.tc{position:relative;width:44px;height:44px;flex-shrink:0}
.tc svg{position:absolute;inset:0;transform:rotate(-90deg)}
.tc-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
/* PHASE BANNER */
.phase-banner{padding:6px 12px;text-align:center;font-size:11px;font-weight:800;letter-spacing:1px;flex-shrink:0}
.pb-wait{background:#333;color:rgba(255,255,255,.5)}
.pb-pre{background:#1a3a5c;color:rgba(255,255,255,.85)}
.pb-flop{background:#0d5c1a;color:#69f0ae}
.pb-turn{background:#5c3d00;color:#ffd740}
.pb-river{background:#5c0d0d;color:#ff8a80}
.pb-result{background:#2d1b5c;color:#b39ddb}
/* GAME TABS */
.gtabs{display:flex;background:#0d2137;flex-shrink:0}
.gtab{padding:8px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.gtab.on{color:#fff;border-bottom-color:var(--green)}
/* GAME CONTENT */
.game-content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* CARD TABLE */
.card-table{background:var(--dark);padding:10px 12px;flex-shrink:0}
.ct-label{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1.5px;text-align:center;margin-bottom:5px}
.ct-community{background:rgba(0,0,0,.35);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:7px 10px;display:flex;justify-content:center;gap:4px;min-height:64px;align-items:center;margin-bottom:8px;position:relative}
.ct-stage-lbl{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;font-size:9px;font-weight:700;padding:1px 8px;border-radius:10px;letter-spacing:1px;white-space:nowrap}
.ct-hands{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ct-hand{background:rgba(0,0,0,.3);border:1px solid rgba(0,200,83,.2);border-radius:8px;padding:6px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .4s}
.ct-hand.winning{border-color:var(--gold);box-shadow:0 0 14px rgba(255,215,0,.4)}
.ct-hand-lbl{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:.5px}
.ct-cards{display:flex;gap:3px;justify-content:center;min-height:52px;align-items:center}
.ct-hand-rank{font-size:9px;color:rgba(255,255,255,.55);margin-top:1px}
/* PLAYING CARDS */
.pcard{border-radius:4px;background:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:2px 3px;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.4);animation:deal .2s ease-out;flex-shrink:0}
.pcard.red{color:#C62828}.pcard.blk{color:#111}
.pcard.down{background:linear-gradient(135deg,#1e3a6e,#0d2448);border:1px solid rgba(100,150,255,.3)}
@keyframes deal{from{transform:translateY(-14px) scale(.85);opacity:0}to{transform:none;opacity:1}}
/* ODDS TABLE */
.odds-table{background:#fff;flex:1}
.ot-section{border-bottom:2px solid #333}
.ot-header{display:grid;grid-template-columns:1fr 86px 86px;background:#fff}
.ot-hcol{padding:7px 4px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.5px}
.ot-hback{background:var(--back);color:#fff}
.ot-hlay{background:var(--lay);color:#fff}
.ot-row{display:grid;grid-template-columns:1fr 86px 86px;border-bottom:1px solid #ececec;min-height:54px;align-items:center}
.ot-name{padding:8px 12px;font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.3}
.ot-cell{padding:3px;display:flex;align-items:center;justify-content:center;height:54px}
.odds-btn{width:80px;height:48px;border:none;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .12s;font-family:inherit}
.odds-btn:active{transform:scale(.95)}
.ob-back{background:var(--back-lt);color:var(--back)}
.ob-back:hover{background:#90CAF9}
.ob-lay{background:var(--lay-lt);color:var(--lay)}
.ob-lay:hover{background:#EF9A9A}
.ob-price{font-size:16px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
.ob-size{font-size:10px;opacity:.65;line-height:1}
.ob-flash{animation:flash .35s ease}
@keyframes flash{50%{filter:brightness(1.4)}}
.round-over{color:var(--red);font-size:12px;font-weight:900;letter-spacing:.5px;text-align:center;width:100%}
.suspended{background:#f5f5f5;border:none;border-radius:4px;width:80px;height:48px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:10px;font-weight:700}
/* MATCHED BETS */
.mb-hdr{background:#1a3a5c;color:#fff;padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
.mb-cols{display:grid;grid-template-columns:1fr 70px 70px;padding:6px 12px;font-size:10px;font-weight:700;color:#888;border-bottom:1px solid #eee}
.mb-row{display:grid;grid-template-columns:1fr 70px 70px;padding:7px 12px;font-size:12px;border-bottom:1px solid #f5f5f5}
/* BET SLIP */
.bsp-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.bsp{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:18px 16px 24px;box-shadow:0 -6px 30px rgba(0,0,0,.3);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bsp-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.bsp-type{font-size:13px;font-weight:900}
.bsp-type.back{color:var(--back)}.bsp-type.lay{color:var(--lay)}
.bsp-runner{font-size:15px;font-weight:700;color:#1a1a1a;margin-top:2px}
.bsp-event{font-size:11px;color:#888;margin-top:1px}
.bsp-x{background:#f0f0f0;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bsp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bsp-lbl{font-size:10px;font-weight:800;color:#888;letter-spacing:1px;width:44px;flex-shrink:0}
.bsp-inp{flex:1;border:2px solid #e0e0e0;border-radius:8px;padding:10px 12px;font-size:20px;font-weight:800;text-align:center;outline:none;font-variant-numeric:tabular-nums}
.bsp-inp.back:focus{border-color:var(--back)}
.bsp-inp.lay:focus{border-color:var(--lay)}
.bsp-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.bsp-q{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer}
.bsp-profit{border-radius:8px;padding:9px 14px;display:flex;justify-content:space-between;font-size:12px;margin-bottom:14px}
.bsp-profit.back{background:#e3f2fd;border:1px solid #90caf9}
.bsp-profit.lay{background:#ffebee;border:1px solid #ef9a9a}
.bsp-place{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;letter-spacing:.5px}
.bsp-place.back{background:var(--back);color:#fff}
.bsp-place.lay{background:var(--lay);color:#fff}
/* ── EXCHANGE (SPORTS) ── */
.exch-layout{display:grid;grid-template-columns:180px 1fr 250px;height:calc(100vh - 95px)}
.exch-left{background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto}
.exch-center{background:#f0f2f5;overflow-y:auto}
.exch-right{background:#fff;border-left:1px solid #e0e0e0;overflow-y:auto}
.els-hdr{padding:7px 10px;background:#f8f9fa;font-size:10px;font-weight:700;color:#6c757d;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #e9ecef}
.els-row{padding:7px 10px 7px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:2px solid transparent;transition:all .1s;font-size:12px}
.els-row:hover{background:#f0f7ff}
.els-row.on{background:#e8f4ff;color:#1565C0;font-weight:700;border-left-color:#1565C0}
.els-cnt{background:#f5f5f5;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;color:#888}
.els-live{background:#e8f5e9;color:#00875a;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.sec-hdr{background:#1a3a5c;color:#fff;padding:7px 12px;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.ev-row{background:#fff;border-bottom:1px solid #ececec;display:flex;align-items:stretch;cursor:pointer;transition:background .1s}
.ev-row:hover{background:#f0f7ff}
.ev-info{flex:1;padding:8px 12px;min-width:0}
.ev-time{font-size:10px;color:#6c757d;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.ev-live-b{font-size:9px;font-weight:700;color:#00875a;background:#e8f5e9;padding:1px 5px;border-radius:3px}
.ev-name{font-size:12px;font-weight:600;color:#212529;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-mkt{font-size:10px;color:#6c757d;margin-top:2px}
.ev-odds{display:flex;gap:4px;align-items:center;padding:8px 8px 8px 0;flex-shrink:0}
.ev-ob{padding:5px 8px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:monospace;min-width:48px;text-align:center;transition:all .12s}
.ev-bk{background:#BBDEFB;color:#1565C0}
.ev-bk:hover{background:#90CAF9}
.ev-ly{background:#FFCDD2;color:#C62828}
.ev-ly:hover{background:#EF9A9A}
.mkt-hdr2{background:#fff;padding:10px 14px;border-bottom:1px solid #dee2e6}
.mkt-title2{font-size:14px;font-weight:700;margin-bottom:3px}
.mkt-meta2{font-size:11px;color:#6c757d;display:flex;gap:10px;flex-wrap:wrap}
.ot2{width:100%;border-collapse:collapse}
.ot2 thead th{background:#f8f9fa;font-size:10px;font-weight:700;color:#6c757d;padding:6px 8px;text-align:center;border-bottom:1px solid #dee2e6;text-transform:uppercase}
.ot2 thead th.rcol{text-align:left;padding-left:12px}
.ot2 thead .bkh{background:#BBDEFB;color:#0d47a1}
.ot2 thead .lyh{background:#FFCDD2;color:#7f0000}
.ot2 tbody tr{border-bottom:1px solid #f0f0f0}
.ot2 tbody tr:hover{background:#fafbfc}
.runner-td{padding:8px 12px;min-width:160px}
.rn2{font-weight:700;font-size:12px}
.ri2{font-size:10px;color:#6c757d;margin-top:1px}
.form-dot{width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;color:#fff}
.fd-w{background:#28a745}.fd-p{background:#fd7e14}.fd-f{background:#dc3545}.fd-x{background:#adb5bd}
.oc2{padding:3px;width:68px;text-align:center}
.ob2{width:100%;padding:5px 2px;border-radius:4px;border:none;cursor:pointer;font-family:monospace;transition:all .12s}
.ob2.bk{background:#BBDEFB;color:#1565C0}
.ob2.bk:hover,.ob2.bk.best{background:#1565C0;color:#fff;font-weight:700}
.ob2.ly{background:#FFCDD2;color:#C62828}
.ob2.ly:hover,.ob2.ly.best{background:#C62828;color:#fff;font-weight:700}
.ob2-p{font-size:13px;font-weight:700;display:block}
.ob2-s{font-size:9px;opacity:.65;display:block;margin-top:1px}
.ltp2{padding:0 8px;text-align:center;font-size:11px;color:#6c757d;font-family:monospace}
.inplay-bar{background:linear-gradient(90deg,#e8f5e9,#f0fff4);border-left:3px solid #00875a;padding:7px 12px;font-size:11px;font-weight:600;color:#00875a;display:flex;align-items:center;gap:6px}
.tab2-bar{display:flex;background:#fff;border-bottom:1px solid #dee2e6;padding:0 12px}
.tab2{padding:9px 14px;cursor:pointer;font-size:12px;font-weight:600;color:#6c757d;border-bottom:2px solid transparent;transition:all .15s}
.tab2.on{color:#1565C0;border-bottom-color:#1565C0}
/* BET SLIP (Exchange) */
.bs2{padding:10px}
.bs2-title{font-size:13px;font-weight:700;color:#212529;margin-bottom:8px;display:flex;justify-content:space-between}
.bs2-tabs{display:flex;gap:3px;background:#f0f0f0;border-radius:4px;padding:3px;margin-bottom:10px}
.bs2t{flex:1;padding:5px;text-align:center;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;color:#888;transition:all .15s}
.bs2t.on{background:#fff;color:#212529;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bs2-empty{text-align:center;padding:28px 10px;color:#888;font-size:12px}
.bs2-item{border-radius:6px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bs2-bk-h{background:#BBDEFB;color:#0d47a1;padding:7px 10px;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.bs2-ly-h{background:#FFCDD2;color:#7f0000;padding:7px 10px;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.bs2-body{background:#fff;padding:8px 10px;border:1px solid #e9ecef;border-top:none;border-radius:0 0 6px 6px}
.bs2-inp{flex:1;border:1px solid #dee2e6;border-radius:4px;padding:5px 8px;font-size:13px;font-weight:700;font-family:monospace;text-align:center;outline:none;color:#212529}
.bs2-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.bs2-lbl{font-size:10px;color:#888;width:36px;flex-shrink:0;font-weight:600}
.bs2-quick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.bs2-q{background:#f8f9fa;border:1px solid #dee2e6;border-radius:3px;padding:3px 7px;font-size:10px;font-weight:700;cursor:pointer}
.bs2-profit{font-size:11px;padding:5px 8px;border-radius:4px;display:flex;justify-content:space-between}
.bs2-bkp{background:#e3f2fd;color:#0d47a1}
.bs2-lyp{background:#ffebee;color:#7f0000}
.bs2-place{width:100%;padding:9px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700;margin-top:6px}
.bs2-go-bk{background:#1565C0;color:#fff}
.bs2-go-ly{background:#C62828;color:#fff}
.mb-item{background:#fff;border:1px solid #e9ecef;border-radius:6px;padding:9px;margin-bottom:6px}
.race-scroll{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #dee2e6}
.race-scroll::-webkit-scrollbar{height:0}
.rs-itm{padding:7px 12px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;text-align:center;transition:all .15s;min-width:78px;flex-shrink:0}
.rs-itm:hover{background:#f8f9fa}
.rs-itm.on{border-bottom-color:#1565C0;background:#f0f7ff}
.rs-t{font-size:11px;font-weight:700;color:#212529}
.rs-v{font-size:10px;color:#6c757d;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78px}
.rs-s{font-size:9px;font-weight:700;margin-top:2px}
.rs-live{color:#00875a}.rs-open{color:#6c757d}
/* TOAST */
.toasts{position:fixed;top:56px;right:10px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:280px}
.toast{border-radius:8px;padding:10px 14px;font-size:12px;font-weight:600;animation:tin .3s ease;box-shadow:0 4px 14px rgba(0,0,0,.25)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.t-win{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20}
.t-lose{background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c}
.t-bet{background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1}
.t-info{background:#fff8e1;border:1px solid #ffe082;color:#e65100}
/* WALLET / LOGIN */
.w-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:700;display:flex;align-items:flex-end;justify-content:center}
.w-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:460px;padding:18px 16px 26px;animation:slideUp .3s ease;max-height:88vh;overflow-y:auto}
.login-bg{min-height:100vh;background:#0d2137;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:18px;padding:34px 26px;width:100%;max-width:360px}
.l-logo{font-size:38px;font-weight:900;text-align:center;color:var(--gold);letter-spacing:4px;margin-bottom:3px;font-family:monospace}
.l-sub{text-align:center;color:#888;font-size:10px;letter-spacing:3px;margin-bottom:20px}
.l-tabs{display:flex;gap:3px;background:#f0f0f0;border-radius:8px;padding:3px;margin-bottom:16px}
.l-tab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;font-weight:800;color:#888;transition:all .2s}
.l-tab.on{background:#fff;color:#1a3a5c;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.l-inp{width:100%;border:2px solid #e0e0e0;border-radius:8px;padding:10px 13px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit}
.l-inp:focus{border-color:var(--teal)}
.l-btn{width:100%;padding:12px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px}
.l-err{background:#ffebee;border:1px solid #ef9a9a;border-radius:6px;padding:8px 12px;color:#b71c1c;font-size:12px;margin-bottom:10px}
.l-hint{text-align:center;font-size:11px;color:#aaa}
.l-bonus{text-align:center;font-size:12px;font-weight:700;color:var(--green)}
.connecting{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#888;gap:12px}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#00897B;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:760px){.exch-layout{grid-template-columns:1fr}.exch-left,.exch-right{display:none}}
/* RACE TRACK */
.race-track{background:linear-gradient(180deg,#1a4010,#0d2808);padding:8px 10px}
.race-lane{display:grid;grid-template-columns:22px 88px 1fr 22px;gap:5px;align-items:center;padding:3px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
.race-lane:last-child{border:none}
/* RESULTS/RULES */
.results-body{padding:10px 12px;overflow-y:auto}
.res-item{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--green)}
.res-gid{font-size:10px;color:#888;margin-bottom:3px}
.res-winner{font-size:13px;font-weight:700;color:#1a3a5c}
.rules-body{padding:14px;font-size:13px;line-height:1.7;color:#333;overflow-y:auto}
.rules-body h3{font-size:14px;font-weight:800;color:#1a3a5c;margin:12px 0 6px}
</style>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONFIG ──────────────────────────────────────────────────
// Change this to your server's address when deployed
const WS_URL = window.location.protocol==='https:' ? `wss://${window.location.host}` : `ws://${window.location.host}`;

// ─── UTILS ───────────────────────────────────────────────────
let toastId=0;
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=(a,b)=>parseFloat((a+Math.random()*(b-a)).toFixed(2));
const fo=o=>{const n=parseFloat(o);return isNaN(n)?'—':n>=10?n.toFixed(0):n>=2?n.toFixed(1):n.toFixed(2);};
const fm=n=>n>=1000?'£'+(n/1000).toFixed(1)+'K':'£'+(n||0).toFixed(0);

// ─── TIMER CIRCLE ────────────────────────────────────────────
function TC({secs,max}){
  const R=17,C=2*Math.PI*R,pct=max>0?Math.max(0,secs/max):0;
  const stroke=secs<=5?'#FF5252':secs<=10?'#FFD740':'#69F0AE';
  return <div className="tc">
    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r={R} fill="none" stroke="rgba(255,255,255,.18)" strokeWidth="4"/><circle cx="22" cy="22" r={R} fill="none" stroke={stroke} strokeWidth="4" strokeDasharray={`${C*pct} ${C}`} strokeLinecap="round"/></svg>
    <div className="tc-num" style={{color:secs<=5?'#FF5252':'#fff'}}>{secs}</div>
  </div>;
}

// ─── CARD ────────────────────────────────────────────────────
function Card({c,w=36,h=52}){
  if(!c)return null;
  if(!c.up)return <div style={{width:w,height:h,borderRadius:4,background:'linear-gradient(135deg,#1e3a6e,#0d2448)',border:'1px solid rgba(100,150,255,.3)',flexShrink:0}}/>;
  return <div className={`pcard ${c.red?'red':'blk'}`} style={{width:w,height:h}}>
    <div style={{fontSize:w<40?9:10,lineHeight:1}}>{c.r}{c.s}</div>
    <div style={{fontSize:w<40?12:14,textAlign:'center',alignSelf:'center',lineHeight:1}}>{c.s}</div>
    <div style={{fontSize:w<40?9:10,transform:'rotate(180deg)',alignSelf:'flex-end',lineHeight:1}}>{c.r}{c.s}</div>
  </div>;
}

// ─── ODDS BUTTON ─────────────────────────────────────────────
function OB({price,size,type,suspended,roundOver,onClick}){
  const [flash,setFlash]=useState(false);
  const prev=useRef(price);
  useEffect(()=>{
    if(prev.current!==price&&!suspended&&!roundOver){setFlash(true);const t=setTimeout(()=>setFlash(false),400);prev.current=price;return()=>clearTimeout(t);}
  },[price]);
  if(roundOver)return <div className="ot-cell"><div className="round-over">ROUND OVER !</div></div>;
  if(suspended)return <div className="ot-cell"><div className="suspended">SUSP.</div></div>;
  return <div className="ot-cell">
    <button className={`odds-btn ${type==='back'?'ob-back':'ob-lay'}${flash?' ob-flash':''}`} onClick={onClick}>
      <span className="ob-price">{fo(price)}</span>
      <span className="ob-size">{fm(size||100)}</span>
    </button>
  </div>;
}

// ─── BET SLIP ─────────────────────────────────────────────────
function BetSlipCard({bet,bal,onPlace,onClose}){
  const [odds,setOdds]=useState(bet.price);
  const [stake,setStake]=useState('');
  const s=Number(stake)||0;
  const profit=bet.type==='back'?s*(odds-1):s;
  const liab=bet.type==='lay'?s*(odds-1):0;
  function place(){if(!s||s<10){alert('Minimum stake ₨10');return;}if(s>bal){alert('Insufficient balance');return;}onPlace({...bet,odds,stake:s});}
  return <div className="bsp-ov" onClick={onClose}>
    <div className="bsp" onClick={e=>e.stopPropagation()}>
      <div className="bsp-hdr">
        <div><div className={`bsp-type ${bet.type}`}>{bet.type==='back'?'BACK':'LAY'}</div><div className="bsp-runner">{bet.runner}</div><div className="bsp-event">{bet.market} — {bet.event}</div></div>
        <button className="bsp-x" onClick={onClose}>✕</button>
      </div>
      <div className="bsp-row"><span className="bsp-lbl">ODDS</span><input className={`bsp-inp ${bet.type}`} type="number" value={odds} step=".01" min="1.01" onChange={e=>setOdds(parseFloat(e.target.value)||odds)}/></div>
      <div className="bsp-row"><span className="bsp-lbl">STAKE</span><input className={`bsp-inp ${bet.type}`} type="number" value={stake} placeholder="₨0" onChange={e=>setStake(e.target.value)}/></div>
      <div className="bsp-quick">{[50,100,200,500,1000,2000].map(v=><button key={v} className="bsp-q" onClick={()=>setStake(p=>String((Number(p)||0)+v))}>+₨{v}</button>)}<button className="bsp-q" onClick={()=>setStake('')}>CLR</button></div>
      {s>0&&<div className={`bsp-profit ${bet.type}`}>{bet.type==='back'?<><span>Profit if wins:</span><b style={{color:'#1b5e20'}}>+₨{profit.toFixed(2)}</b></>:<><span>Liability:</span><b style={{color:'#b71c1c'}}>-₨{liab.toFixed(2)}</b></>}</div>}
      <button className={`bsp-place ${bet.type}`} onClick={place}>PLACE {bet.type.toUpperCase()} — ₨{s||'0'}</button>
    </div>
  </div>;
}

// ─── TOAST ────────────────────────────────────────────────────
function Toasts({items}){return <div className="toasts">{items.map(t=><div key={t.id} className={`toast t-${t.type}`}>{t.msg}</div>)}</div>;}

// ─── GAME VIEW (shared live state from server) ────────────────
function GameView({gameKey,state,sendBet,bal,addToast}){
  const [betSlip,setBetSlip]=useState(null);
  const [gameTab,setGameTab]=useState('game');
  const [myBets,setMyBets]=useState([]);

  if(!state)return <div className="connecting"><div className="spinner"/><div>Connecting to live game...</div></div>;

  const {phase,timer,gid,hands,comm,odds,sizes,extraOdds,winner,results,
         pH,bH,c1,c2,outcome,positions,raceOrder,horses} = state;

  const isBetting=['pre','flop','turn','river'].includes(phase);
  const isRoundOver=!isBetting&&phase!=='wait';
  const isSuspended=phase==='wait';

  const PHASE_NAMES={wait:'⏳ Waiting for next round...',pre:'PRE-FLOP — Betting Open',flop:'FLOP — 3 Cards Revealed',turn:'TURN — 4th Card',river:'RIVER — Final Card',result:'🏆 RESULT'};
  const PHASE_CLASS={wait:'pb-wait',pre:'pb-pre',flop:'pb-flop',turn:'pb-turn',river:'pb-river',result:'pb-result'};
  const MAX_T={wait:8,pre:20,flop:20,turn:20,river:20,result:6};

  function openBet(runner,price,type,market,handIdx=null){
    if(!isBetting){addToast('Betting is closed','info');return;}
    setBetSlip({runner,price,type,market,event:`Game #${gid}`,handIdx});
  }
  function placeBet(bet){
    setBal_local(b=>b-bet.stake); // optimistic
    setMyBets(p=>[...p,{...bet,id:Date.now(),settled:false}]);
    sendBet({game:gameKey,...bet});
    setBetSlip(null);
    addToast(`${bet.type==='back'?'🔵 Back':'🔴 Lay'}: ${bet.runner} @ ${bet.odds} — ₨${bet.stake}`,'bet');
  }
  // local balance delta
  const [balDelta,setBalDelta]=useState(0);
  const setBal_local=(fn)=>{}; // handled by parent

  // Settle my bets when result comes
  useEffect(()=>{
    if(phase!=='result'||!winner)return;
    myBets.filter(b=>!b.settled).forEach(b=>{
      let won=false;
      if(b.market==='hand'&&hands){won=b.type==='back'?winner.i===b.handIdx:winner.i!==b.handIdx;}
      else if(b.runner==='Player'&&pH) won=b.type==='back'?state.winner?.w==='player':state.winner?.w!=='player';
      // simplified - server handles real settlement
    });
    setMyBets(p=>p.map(b=>({...b,settled:true})));
  },[phase,winner]);

  const isHoldem=['holdem','turbo_holdem','blackjack','turbo_bj','omaha'].includes(gameKey);
  const isBac=['baccarat','turbo_bac'].includes(gameKey);
  const isHiLo=['hilo','turbo_hilo'].includes(gameKey);
  const isDerby=['derby','turbo_derby'].includes(gameKey);

  const HORSE_NAMES_C=['Thunder Road','Silver Arrow','Night Dancer','Golden Flame','Desert Wind','Lucky Star'];
  const HORSE_COLORS_C=['#e74c3c','#3498db','#f0f0f0','#111','#f39c12','#000080'];
  const HORSE_JOCKEYS_C=['F. Dettori','W. Buick','R. Moore','J. Spencer','P. Hanagan','T. Queally'];

  return <div className="game-screen">
    <div className="gm-hdr">
      <div className="gm-hdr-left">
        <TC secs={timer||0} max={MAX_T[phase]||20}/>
        <div><div className="gm-id"><b>Game ID: {gid}</b>Balance: ₨{bal.toLocaleString()}</div></div>
      </div>
      <div style={{fontSize:10,color:'rgba(255,255,255,.5)',textAlign:'right'}}>{gameKey.replace('_',' ').toUpperCase()}</div>
    </div>
    <div className={`phase-banner ${PHASE_CLASS[phase]||'pb-wait'}`}>{PHASE_NAMES[phase]||'—'}</div>
    <div className="gtabs">
      <div className={`gtab${gameTab==='game'?' on':''}`} onClick={()=>setGameTab('game')}>Game</div>
      <div className={`gtab${gameTab==='results'?' on':''}`} onClick={()=>setGameTab('results')}>Results</div>
      <div className={`gtab${gameTab==='rules'?' on':''}`} onClick={()=>setGameTab('rules')}>Rules</div>
    </div>

    {gameTab==='game'&&<div className="game-content">
      {/* ── HOLDEM/OMAHA CARDS ── */}
      {isHoldem&&<div className="card-table">
        <div className="ct-label">COMMUNITY CARDS</div>
        <div className="ct-community">
          <div className="ct-stage-lbl">{phase==='wait'||phase==='pre'?'PRE-FLOP':phase==='flop'?'FLOP':phase==='turn'?'TURN':phase==='river'?'RIVER':'BOARD'}</div>
          {(!comm||comm.length===0)&&<span style={{color:'rgba(255,255,255,.25)',fontSize:11}}>Revealed after pre-flop betting</span>}
          {(comm||[]).map((c,i)=><Card key={i} c={{...c,up:true}} w={34} h={48}/>)}
          {comm&&comm.length>0&&comm.length<5&&Array.from({length:5-comm.length},(_,i)=><div key={i} style={{width:34,height:48,borderRadius:4,background:'rgba(0,0,0,.3)',border:'1px dashed rgba(255,255,255,.12)'}}/>)}
        </div>
        <div className="ct-hands">
          {(hands||[[],[],[],[]]).map((h,i)=><div key={i} className={`ct-hand${winner&&winner.i===i?' winning':''}`}>
            <div className="ct-hand-lbl">Hand {i+1}{winner&&winner.i===i?' 🏆':''}</div>
            <div className="ct-cards">{(h||[]).map((c,j)=><Card key={j} c={c} w={32} h={46}/>)}</div>
          </div>)}
        </div>
        {winner&&phase==='result'&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:8,padding:'7px 12px',marginTop:8,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>🏆 Hand {winner.i+1} WINS — {winner.ev?.name||''}</div>}
      </div>}

      {/* ── BACCARAT CARDS ── */}
      {isBac&&<div className="card-table">
        <div style={{display:'grid',gridTemplateColumns:'1fr 40px 1fr',gap:8,alignItems:'center'}}>
          <div className="ct-hand"><div className="ct-hand-lbl">PLAYER</div><div className="ct-cards">{(pH||[]).map((c,i)=><Card key={i} c={c} w={32} h={46}/>)}</div>{phase==='result'&&state.winner&&<div style={{fontSize:22,fontWeight:900,color:'#fff'}}>{state.winner.pv}</div>}</div>
          <div style={{textAlign:'center',color:'rgba(255,255,255,.4)',fontWeight:900,fontSize:16}}>VS</div>
          <div className="ct-hand"><div className="ct-hand-lbl">BANKER</div><div className="ct-cards">{(bH||[]).map((c,i)=><Card key={i} c={c} w={32} h={46}/>)}</div>{phase==='result'&&state.winner&&<div style={{fontSize:22,fontWeight:900,color:'#fff'}}>{state.winner.bv}</div>}</div>
        </div>
        {phase==='result'&&state.winner&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:8,padding:'7px',marginTop:8,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>{state.winner.w==='player'?'🏆 PLAYER WINS':state.winner.w==='banker'?'🏦 BANKER WINS':'🤝 TIE'}</div>}
      </div>}

      {/* ── HI-LO CARDS ── */}
      {isHiLo&&<div className="card-table">
        <div style={{display:'flex',justifyContent:'center',gap:20,alignItems:'center',padding:'8px 0'}}>
          <div style={{textAlign:'center'}}><div style={{color:'var(--gold)',fontSize:10,fontWeight:700,marginBottom:5}}>CARD 1</div>{c1&&<Card c={c1}/>}</div>
          <div style={{fontSize:22,color:'rgba(255,255,255,.5)',fontWeight:900}}>→</div>
          <div style={{textAlign:'center'}}><div style={{color:'var(--gold)',fontSize:10,fontWeight:700,marginBottom:5}}>CARD 2</div>{c2&&c2.up?<Card c={c2}/>:<div style={{width:36,height:52,borderRadius:4,background:'rgba(0,0,0,.3)',border:'1px dashed rgba(255,255,255,.15)'}}/>}</div>
        </div>
        {outcome&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:8,padding:'7px',marginTop:4,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>{outcome.res==='hi'?'⬆ HIGHER':outcome.res==='lo'?'⬇ LOWER':'= EQUAL'}</div>}
      </div>}

      {/* ── DERBY RACE ── */}
      {isDerby&&<div className="race-track">
        {HORSE_NAMES_C.map((name,i)=>{
          const pos=(positions||[])[i]||0;
          const finPos=(raceOrder||[]).indexOf(i)+1;
          return <div key={i} style={{display:'grid',gridTemplateColumns:'20px 88px 1fr 20px',gap:5,alignItems:'center',padding:'3px 0',borderBottom:'1px dashed rgba(255,255,255,.07)'}}>
            <div style={{width:18,height:18,borderRadius:'50%',background:HORSE_COLORS_C[i],border:'1px solid rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:900,color:HORSE_COLORS_C[i]==='#f0f0f0'||HORSE_COLORS_C[i]==='#f39c12'?'#000':'#fff',flexShrink:0}}>{i+1}</div>
            <div><div style={{color:'#fff',fontSize:10,fontWeight:700,lineHeight:1.2}}>{name}</div><div style={{color:'rgba(255,255,255,.4)',fontSize:8}}>{HORSE_JOCKEYS_C[i]}</div></div>
            <div style={{background:'rgba(0,0,0,.4)',borderRadius:3,height:18,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${pos}%`,background:`${HORSE_COLORS_C[i]}33`,transition:'width .08s'}}/>
              <div style={{position:'absolute',left:`${Math.min(pos,90)}%`,top:1,fontSize:12,lineHeight:1,transition:'left .08s'}}>🐎</div>
              <div style={{position:'absolute',right:0,top:0,bottom:0,width:2,background:'rgba(255,215,0,.5)'}}/>
            </div>
            <div style={{width:18,height:18,borderRadius:'50%',background:finPos>0?['#FFD700','#C0C0C0','#CD7F32','rgba(255,255,255,.1)','rgba(255,255,255,.1)','rgba(255,255,255,.1)'][finPos-1]:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900,color:'#fff'}}>{finPos>0?finPos:''}</div>
          </div>;
        })}
        {phase==='result'&&state.winner!==null&&state.winner!==undefined&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:6,padding:'7px',marginTop:8,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>🏆 {HORSE_NAMES_C[state.winner]} WINS!</div>}
      </div>}

      {/* ── ODDS TABLE ── */}
      <div className="odds-table">
        <div className="ot-section">
          <div className="ot-header"><div/><div className="ot-hcol ot-hback">BACK</div><div className="ot-hcol ot-hlay">LAY</div></div>

          {/* HOLDEM/OMAHA ROWS */}
          {isHoldem&&(odds||[3.9,3.9,3.9,3.9]).map((price,i)=><div key={i} className="ot-row" style={{background:i%2?'#fafafa':'#fff'}}>
            <div className="ot-name">Hand {i+1}</div>
            <OB price={price} size={(sizes||[])[i]||500} type="back" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(`Hand ${i+1}`,price,'back','hand winner',i)}/>
            <OB price={+(price+0.1).toFixed(2)} size={Math.max(10,((sizes||[])[i]||500)-ri(50,200))} type="lay" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(`Hand ${i+1}`,+(price+0.1).toFixed(2),'lay','hand winner',i)}/>
          </div>)}

          {/* BACCARAT ROWS */}
          {isBac&&[['Player',state.odds?.p||1.98,ri(200,2000)],['Banker',state.odds?.b||1.93,ri(200,2000)],['Tie',state.odds?.t||10,ri(30,200)],['Player Pair',state.odds?.pp||11,ri(20,150)],['Banker Pair',state.odds?.bp||11,ri(20,150)]].map(([name,price,sz],i)=><div key={i} className="ot-row" style={{background:i%2?'#fafafa':'#fff'}}>
            <div className="ot-name">{name}</div>
            <OB price={+price.toFixed(2)} size={sz} type="back" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(name,+price.toFixed(2),'back','Baccarat')}/>
            <OB price={+(price+0.1).toFixed(2)} size={Math.max(5,sz-ri(5,50))} type="lay" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(name,+(price+0.1).toFixed(2),'lay','Baccarat')}/>
          </div>)}

          {/* HILO ROWS */}
          {isHiLo&&[['Higher',state.odds?.hi||2.0,ri(200,2000)],['Lower',state.odds?.lo||2.0,ri(200,2000)],['Equal',state.odds?.eq||12,ri(20,150)]].map(([name,price,sz],i)=><div key={i} className="ot-row" style={{background:i%2?'#fafafa':'#fff'}}>
            <div className="ot-name">{name}</div>
            <OB price={+price.toFixed(2)} size={sz} type="back" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(name,+price.toFixed(2),'back','Hi Lo')}/>
            <OB price={+(price+0.1).toFixed(2)} size={Math.max(5,sz-ri(5,50))} type="lay" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(name,+(price+0.1).toFixed(2),'lay','Hi Lo')}/>
          </div>)}

          {/* DERBY ROWS */}
          {isDerby&&HORSE_NAMES_C.map((name,i)=><div key={i} className="ot-row" style={{background:i%2?'#fafafa':'#fff'}}>
            <div className="ot-name" style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:14,height:14,borderRadius:'50%',background:HORSE_COLORS_C[i],border:'1px solid #ddd',flexShrink:0}}/>
              <div><div style={{fontSize:12,fontWeight:700}}>{i+1}. {name}</div><div style={{fontSize:10,color:'#888'}}>{HORSE_JOCKEYS_C[i]}</div></div>
            </div>
            <OB price={fo((state.odds||[])[i]||3)} size={ri(100,2000)} type="back" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(`Horse ${i+1}`,parseFloat(fo((state.odds||[])[i]||3)),'back','Derby Race')}/>
            <OB price={+(parseFloat(fo((state.odds||[])[i]||3))+0.1).toFixed(2)} size={ri(80,1500)} type="lay" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(`Horse ${i+1}`,+(parseFloat(fo((state.odds||[])[i]||3))+0.1).toFixed(2),'lay','Derby Race')}/>
          </div>)}
        </div>

        {/* Extra markets for Hold'em */}
        {isHoldem&&extraOdds&&<div className="ot-section">
          <div className="ot-header"><div/><div className="ot-hcol ot-hback">BACK</div><div className="ot-hcol ot-hlay">LAY</div></div>
          {[['Winner has FH or better',extraOdds.fh],['Winner has Flush',extraOdds.flush],['Winner has Straight',extraOdds.str],['Winner has Three of a Kind',extraOdds.tok],['Winner has Two Pair or worse',extraOdds.two]].map(([name,price],i)=><div key={i} className="ot-row" style={{background:i%2?'#fafafa':'#fff'}}>
            <div className="ot-name" style={{fontSize:12}}>{name}</div>
            <OB price={+(price||3).toFixed(2)} size={ri(30,200)} type="back" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(name,+(price||3).toFixed(2),'back','special market')}/>
            <OB price={+((price||3)+0.1).toFixed(2)} size={ri(20,150)} type="lay" roundOver={isRoundOver} suspended={isSuspended} onClick={()=>openBet(name,+((price||3)+0.1).toFixed(2),'lay','special market')}/>
          </div>)}
        </div>}

        {/* Matched Bets */}
        <div className="mb-hdr">Matched Bets ({myBets.length})</div>
        <div className="mb-cols"><span>Runner</span><span>Price</span><span>Size</span></div>
        {myBets.map(b=><div key={b.id} className="mb-row"><span style={{color:b.type==='back'?'#1565C0':'#C62828',fontWeight:600,fontSize:11}}>{b.runner}</span><span>{b.odds}</span><span>₨{b.stake}</span></div>)}
        {myBets.length===0&&<div style={{padding:'12px',color:'#bbb',fontSize:12,textAlign:'center'}}>No bets yet</div>}
      </div>
    </div>}

    {gameTab==='results'&&<div className="results-body">
      <div style={{fontWeight:800,color:'#1a3a5c',marginBottom:10,fontSize:14}}>Recent Results</div>
      {(!results||results.length===0)&&<div style={{color:'#aaa',fontSize:13}}>No results yet</div>}
      {(results||[]).map((r,i)=><div key={i} className="res-item">
        <div className="res-gid">Game #{r.gid} — {r.time}</div>
        <div className="res-winner">
          {isHoldem&&`🏆 Hand ${(r.winner?.i??0)+1} wins — ${r.winner?.ev?.name||''}`}
          {isBac&&(r.w==='player'?'🏆 Player':r.w==='banker'?'🏦 Banker':'🤝 Tie')+` | P:${r.pv} B:${r.bv}`}
          {isHiLo&&(r.res==='hi'?'⬆ Higher':r.res==='lo'?'⬇ Lower':'= Equal')}
          {isDerby&&`🏆 ${r.name||'Horse '+(r.winner+1)}`}
        </div>
      </div>)}
    </div>}

    {gameTab==='rules'&&<div className="rules-body">
      <h3>How the Exchange Works</h3>
      <p><b>PRE-FLOP (20s):</b> Cards face-down. All bets at equal odds.</p>
      <p><b>FLOP (20s):</b> {isHoldem?'3 community cards revealed. Hands flip up. Odds update!':isBac?'1st cards revealed. Odds update.':isDerby?'Race starts — 1st turn.':'Card 1 revealed.'}</p>
      <p><b>TURN (20s):</b> {isHoldem?'4th community card revealed. Odds tighten.':isDerby?'2nd turn.':isBac?'All cards shown.':'Further betting.'}</p>
      <p><b>RIVER (20s):</b> {isHoldem?'5th and final card. Near-final odds.':isDerby?'Final straight — race to finish!':'Final betting round.'}</p>
      <p><b>RESULT:</b> Winner determined. All bets settled automatically.</p>
      <h3>Back vs Lay</h3>
      <p><b>BACK (Blue):</b> Bet it WILL happen. Win = Stake × (Odds − 1)</p>
      <p><b>LAY (Pink):</b> Bet it will NOT happen. Win = Stake. Liability = Stake × (Odds − 1)</p>
      <h3>Same Game for All Users</h3>
      <p>All players see the same game, same round, same cards. The server runs the game — you just back or lay.</p>
    </div>}

    {betSlip&&<BetSlipCard bet={betSlip} bal={bal} onPlace={placeBet} onClose={()=>setBetSlip(null)}/>}
  </div>;
}

// ─── EXCHANGE (SPORTS) VIEW ───────────────────────────────────
function ExchangeView({sports,bal,addToast}){
  const [sportTab,setSportTab]=useState('hr');
  const [selRace,setSelRace]=useState(null);
  const [selMatch,setSelMatch]=useState(null);
  const [selMkt,setSelMkt]=useState(null);
  const [exSlip,setExSlip]=useState([]);
  const [exBets,setExBets]=useState([]);
  const [bsTab,setBsTab]=useState('slip');
  const [localBal,setLocalBal]=useState(bal);

  useEffect(()=>setLocalBal(bal),[bal]);

  const data=sports||{hrRaces:[],grRaces:[],fbMatches:[],tnMatches:[],crMatches:[],golfTournaments:[]};

  function addToSlip(runner,price,size,type,event,mkt){
    if(exSlip.find(b=>b.runner===runner&&b.type===type&&b.event===event)){addToast('Already in slip','info');return;}
    setExSlip(p=>[...p,{id:Date.now()+Math.random(),runner,odds:parseFloat(price),size,type,event,mkt,stake:0}]);
    addToast(`${type==='back'?'🔵':'🔴'} ${runner} @ ${fo(price)}`,'bet');
  }
  function updStake(id,v){setExSlip(p=>p.map(b=>b.id===id?{...b,stake:parseFloat(v)||0}:b));}
  function updOdds(id,v){setExSlip(p=>p.map(b=>b.id===id?{...b,odds:parseFloat(v)||b.odds}:b));}
  function placeAll(){
    const valid=exSlip.filter(b=>b.stake>0);
    if(!valid.length){addToast('Enter stake to place','info');return;}
    const cost=valid.reduce((s,b)=>s+(b.type==='back'?b.stake:b.stake*(b.odds-1)),0);
    if(cost>localBal){addToast('Insufficient funds','lose');return;}
    setLocalBal(b=>b-cost);
    const placed=valid.map(b=>({...b,placedId:b.id,id:Date.now()+Math.random(),status:'matched',time:new Date().toLocaleTimeString()}));
    setExBets(p=>[...p,...placed]);setExSlip([]);
    addToast(`✅ ${placed.length} bet(s) placed`,'bet');
    placed.forEach(b=>setTimeout(()=>{
      const won=Math.random()>0.45;
      if(won){const ret=b.type==='back'?b.stake*b.odds:b.stake*2;setLocalBal(p=>p+ret);setExBets(p=>p.map(x=>x.placedId===b.placedId?{...x,status:'won'}:x));addToast(`🏆 WON: ${b.runner} +₨${(ret-b.stake).toFixed(0)}`,'win');}
      else{if(b.type==='lay')setLocalBal(p=>p-b.stake*(b.odds-1));setExBets(p=>p.map(x=>x.placedId===b.placedId?{...x,status:'lost'}:x));addToast(`❌ Lost: ${b.runner}`,'lose');}
    },8000+Math.random()*5000));
  }

  const SPORTS=[{id:'hr',l:'🏇 Horse Racing',count:(data.hrRaces||[]).length},{id:'gr',l:'🐕 Greyhounds',count:(data.grRaces||[]).length},{id:'fb',l:'⚽ Football',count:(data.fbMatches||[]).length},{id:'tn',l:'🎾 Tennis',count:(data.tnMatches||[]).length},{id:'cr',l:'🏏 Cricket',count:(data.crMatches||[]).length},{id:'gf',l:'⛳ Golf',count:((data.golfTournaments||[]).length*20)}];
  const totStake=exSlip.reduce((s,b)=>s+(b.stake||0),0);
  const totPot=exSlip.filter(b=>b.type==='back').reduce((s,b)=>s+(b.stake||0)*(b.odds-1),0);
  const totLiab=exSlip.filter(b=>b.type==='lay').reduce((s,b)=>s+(b.stake||0)*(b.odds-1),0);
  const openBets=exBets.filter(b=>b.status==='matched');
  const settled=exBets.filter(b=>['won','lost'].includes(b.status));

  const selRaceData=(data.hrRaces||[]).find(r=>r.id===selRace)||(data.grRaces||[]).find(r=>r.id===selRace);
  const selMatchData=(data.fbMatches||[]).find(m=>m.id===selMatch)||(data.tnMatches||[]).find(m=>m.id===selMatch)||(data.crMatches||[]).find(m=>m.id===selMatch);
  const selMktData=selMatchData?.markets?.find(m=>m.id===selMkt)||selMatchData?.markets?.[0];

  return <div className="exch-layout">
    {/* LEFT */}
    <div className="exch-left">
      <div className="els-hdr">Sports</div>
      {SPORTS.map(s=><div key={s.id} className={`els-row${sportTab===s.id?' on':''}`} onClick={()=>{setSportTab(s.id);setSelRace(null);setSelMatch(null);}}>
        <span style={{fontSize:12}}>{s.l}</span>
        <span className="els-cnt">{s.count}</span>
      </div>)}
      <div className="els-hdr" style={{marginTop:8}}>In-Play</div>
      {(data.hrRaces||[]).filter(r=>r.status==='inplay').slice(0,5).map(r=><div key={r.id} className="els-row" onClick={()=>{setSportTab('hr');setSelRace(r.id);}}>
        <span style={{fontSize:11}}>🏇 {r.venue} {r.time}</span>
        <span className="els-live">LIVE</span>
      </div>)}
      {(data.fbMatches||[]).filter(m=>m.status==='inplay').slice(0,4).map(m=><div key={m.id} className="els-row" onClick={()=>{setSportTab('fb');setSelMatch(m.id);}}>
        <span style={{fontSize:11}}>⚽ {m.team1.slice(0,8)} v {m.team2.slice(0,8)}</span>
        <span className="els-live">LIVE</span>
      </div>)}
    </div>

    {/* CENTER */}
    <div className="exch-center">
      {/* HORSE RACING */}
      {sportTab==='hr'&&!selRaceData&&<>
        <div className="race-scroll">{(data.hrRaces||[]).slice(0,24).map(r=><div key={r.id} className={`rs-itm${r.id===selRace?' on':''}`} onClick={()=>setSelRace(r.id)}><div className="rs-t">{r.time}</div><div className="rs-v">{r.venue}</div><div className={`rs-s ${r.status==='inplay'?'rs-live':'rs-open'}`}>{r.status==='inplay'?'● LIVE':'Open'}</div></div>)}</div>
        <div className="sec-hdr">🏇 Horse Racing — UK &amp; Ireland<span style={{opacity:.6,fontSize:10}}>{(data.hrRaces||[]).filter(r=>r.status==='inplay').length} In-Play</span></div>
        {(data.hrRaces||[]).map(r=><div key={r.id} className="ev-row" onClick={()=>setSelRace(r.id)}>
          <div className="ev-info"><div className="ev-time">{r.status==='inplay'&&<span className="ev-live-b">● LIVE</span>}{r.time}</div><div className="ev-name">🏇 {r.venue} — {r.distance} {r.going}</div><div className="ev-mkt">{r.runners?.length} runners | £{((r.matched||0)/1000).toFixed(0)}K</div></div>
          <div className="ev-odds">{(r.runners||[]).slice(0,3).map(rr=><button key={rr.id} className="ev-ob ev-bk" onClick={e=>{e.stopPropagation();addToSlip(rr.name,rr.odds?.backs?.[2]?.p||2,rr.odds?.backs?.[2]?.s||100,'back',`${r.venue} ${r.time}`,'Win Market');}}>
            <span style={{fontSize:9,display:'block'}}>{rr.name?.split(' ')[0]}</span>{fo(rr.odds?.backs?.[2]?.p||2)}
          </button>)}</div>
        </div>)}
      </>}
      {sportTab==='hr'&&selRaceData&&<>
        <div style={{background:'#fff',padding:'7px 12px',borderBottom:'1px solid #dee2e6',fontSize:11,color:'#6c757d'}}><span style={{cursor:'pointer',color:'#1565C0'}} onClick={()=>setSelRace(null)}>Horse Racing</span> › {selRaceData.venue} {selRaceData.time}</div>
        {selRaceData.status==='inplay'&&<div className="inplay-bar"><span style={{animation:'pulse 1.5s infinite',display:'inline-block',width:7,height:7,borderRadius:'50%',background:'#00875a'}}/>IN-RUNNING — Betting Live!</div>}
        <div className="mkt-hdr2"><div className="mkt-title2">🏇 {selRaceData.venue} — {selRaceData.time} — {selRaceData.distance} {selRaceData.going}</div><div className="mkt-meta2"><span>{selRaceData.runners?.length} runners</span><span style={{color:'#00875a',fontWeight:700}}>£{((selRaceData.matched||0)/1000).toFixed(0)}K matched</span></div></div>
        <div style={{overflowX:'auto'}}>
          <table className="ot2" style={{tableLayout:'fixed',width:'100%'}}><colgroup><col style={{width:'auto'}}/>{Array(6).fill(null).map((_,i)=><col key={i} style={{width:68}}/>)}<col style={{width:52}}/></colgroup>
          <thead><tr><th className="rcol">RUNNER</th><th className="bkh" colSpan={3}>← BACK</th><th className="lyh" colSpan={3}>LAY →</th><th>LTP</th></tr></thead>
          <tbody>{(selRaceData.runners||[]).map((rr,idx)=>{
            const COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e'];
            return <tr key={rr.id}>
              <td className="runner-td"><div style={{display:'flex',alignItems:'flex-start',gap:7}}><div style={{width:20,height:20,borderRadius:3,background:COLORS[idx%8],display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:9,color:'#fff',flexShrink:0}}>{rr.draw||idx+1}</div><div><div className="rn2">{rr.name}</div><div className="ri2">{rr.jockey}</div><div style={{display:'flex',gap:2,marginTop:2}}>{(rr.form||[]).map((f,i)=>{const cls=f==='W'?'fd-w':f==='2'||f==='3'?'fd-p':f==='F'||f==='U'?'fd-f':'fd-x';return <span key={i} className={`form-dot ${cls}`}>{f}</span>;})}</div><div className="ri2">SP: {rr.sp}</div></div></div></td>
              {(rr.odds?.backs||[]).map((b,i)=><td key={`b${i}`} className="oc2"><button className={`ob2 bk${i===2?' best':''}`} onClick={()=>addToSlip(rr.name,b.p,b.s,'back',`${selRaceData.venue} ${selRaceData.time}`,'Win Market')}><span className="ob2-p">{fo(b.p)}</span><span className="ob2-s">{fm(b.s)}</span></button></td>)}
              {(rr.odds?.lays||[]).map((l,i)=><td key={`l${i}`} className="oc2"><button className={`ob2 ly${i===0?' best':''}`} onClick={()=>addToSlip(rr.name,l.p,l.s,'lay',`${selRaceData.venue} ${selRaceData.time}`,'Win Market')}><span className="ob2-p">{fo(l.p)}</span><span className="ob2-s">{fm(l.s)}</span></button></td>)}
              <td className="ltp2">{fo(rr.ltp)}</td>
            </tr>;
          })}</tbody></table>
        </div>
      </>}

      {/* GREYHOUNDS */}
      {sportTab==='gr'&&<>
        <div className="sec-hdr">🐕 Greyhound Racing</div>
        {(data.grRaces||[]).map(r=><div key={r.id} className="ev-row" onClick={()=>setSelRace(r.id)}>
          <div className="ev-info"><div className="ev-time">{r.status==='inplay'&&<span className="ev-live-b">● LIVE</span>}{r.time}</div><div className="ev-name">🐕 {r.venue} — {r.distance} Grade {r.grade}</div></div>
          <div className="ev-odds">{(r.runners||[]).slice(0,3).map(rr=><button key={rr.id} className="ev-ob ev-bk" onClick={e=>{e.stopPropagation();addToSlip(rr.name,rr.odds?.backs?.[2]?.p||2,rr.odds?.backs?.[2]?.s||100,'back',`${r.venue} ${r.time}`,'Win');}}>{fo(rr.odds?.backs?.[2]?.p||2)}</button>)}</div>
        </div>)}
      </>}

      {/* FOOTBALL */}
      {sportTab==='fb'&&!selMatchData&&<>
        <div className="sec-hdr">⚽ Football — All Leagues</div>
        {Object.entries((data.fbMatches||[]).reduce((m,e)=>{if(!m[e.league])m[e.league]=[];m[e.league].push(e);return m},{})).map(([league,matches])=><React.Fragment key={league}>
          <div style={{background:'#eef2f7',padding:'6px 12px',fontSize:11,fontWeight:700,color:'#1a3a5c',borderBottom:'1px solid #dee2e6'}}>{league}</div>
          {matches.map(m=><div key={m.id} className="ev-row" onClick={()=>{setSelMatch(m.id);setSelMkt(m.markets?.[0]?.id);}}>
            <div className="ev-info"><div className="ev-time">{m.status==='inplay'&&<span className="ev-live-b">● {m.minute}'</span>}</div><div className="ev-name">{m.team1} v {m.team2} {m.status==='inplay'&&`[${m.score}]`}</div><div className="ev-mkt">{m.markets?.length} markets</div></div>
            <div className="ev-odds">{m.markets?.[0]?.runners?.map(r=><button key={r.id} className="ev-ob ev-bk" onClick={e=>{e.stopPropagation();addToSlip(r.name,r.odds?.backs?.[2]?.p||2,r.odds?.backs?.[2]?.s||100,'back',`${m.team1} v ${m.team2}`,m.markets[0].name);}}><span style={{fontSize:9}}>{r.name?.slice(0,5)}</span>{fo(r.odds?.backs?.[2]?.p||2)}</button>)}</div>
          </div>)}
        </React.Fragment>)}
      </>}
      {sportTab==='fb'&&selMatchData&&<>
        <div style={{background:'#fff',padding:'7px 12px',borderBottom:'1px solid #dee2e6',fontSize:11,color:'#6c757d'}}><span style={{cursor:'pointer',color:'#1565C0'}} onClick={()=>setSelMatch(null)}>Football</span> › {selMatchData.team1} v {selMatchData.team2}</div>
        {selMatchData.status==='inplay'&&<div className="inplay-bar"><span style={{width:7,height:7,borderRadius:'50%',background:'#00875a',animation:'pulse 1.5s infinite',display:'inline-block'}}/>{selMatchData.minute}' — {selMatchData.team1} <b style={{margin:'0 6px',background:'#1a3a5c',color:'#fff',padding:'3px 9px',borderRadius:3,fontFamily:'monospace'}}>{selMatchData.score}</b> {selMatchData.team2}</div>}
        <div className="mkt-hdr2"><div className="mkt-title2">⚽ {selMatchData.team1} v {selMatchData.team2}</div></div>
        <div className="tab2-bar">{selMatchData.markets?.map(m=><div key={m.id} className={`tab2${(selMkt||selMatchData.markets[0]?.id)===m.id?' on':''}`} onClick={()=>setSelMkt(m.id)}>{m.name}</div>)}</div>
        {selMktData&&<div style={{overflowX:'auto'}}>
          <table className="ot2" style={{tableLayout:'fixed',width:'100%'}}><colgroup><col style={{width:'auto'}}/>{Array(6).fill(null).map((_,i)=><col key={i} style={{width:68}}/>)}<col style={{width:52}}/></colgroup>
          <thead><tr><th className="rcol">SELECTION</th><th className="bkh" colSpan={3}>← BACK</th><th className="lyh" colSpan={3}>LAY →</th><th>LTP</th></tr></thead>
          <tbody>{selMktData.runners?.map(r=><tr key={r.id}><td className="runner-td"><div className="rn2">{r.name}</div><div className="ri2">{fm(r.matched)} matched</div></td>{(r.odds?.backs||[]).map((b,i)=><td key={`b${i}`} className="oc2"><button className={`ob2 bk${i===2?' best':''}`} onClick={()=>addToSlip(r.name,b.p,b.s,'back',`${selMatchData.team1} v ${selMatchData.team2}`,selMktData.name)}><span className="ob2-p">{fo(b.p)}</span><span className="ob2-s">{fm(b.s)}</span></button></td>)}{(r.odds?.lays||[]).map((l,i)=><td key={`l${i}`} className="oc2"><button className={`ob2 ly${i===0?' best':''}`} onClick={()=>addToSlip(r.name,l.p,l.s,'lay',`${selMatchData.team1} v ${selMatchData.team2}`,selMktData.name)}><span className="ob2-p">{fo(l.p)}</span><span className="ob2-s">{fm(l.s)}</span></button></td>)}<td className="ltp2">{fo(r.ltp)}</td></tr>)}</tbody>
          </table>
        </div>}
      </>}

      {/* TENNIS */}
      {sportTab==='tn'&&<>
        <div className="sec-hdr">🎾 Tennis</div>
        {(data.tnMatches||[]).map(m=><div key={m.id} className="ev-row">
          <div className="ev-info"><div className="ev-time">{m.status==='inplay'&&<span className="ev-live-b">● LIVE</span>}<span style={{marginLeft:4}}>{m.league}</span></div><div className="ev-name">{m.team1} v {m.team2} {m.status==='inplay'&&`[${m.score}]`}</div></div>
          <div className="ev-odds">{m.markets?.[0]?.runners?.slice(0,2).map(r=><button key={r.id} className="ev-ob ev-bk" onClick={()=>addToSlip(r.name,r.odds?.backs?.[2]?.p||2,r.odds?.backs?.[2]?.s||100,'back',`${m.team1} v ${m.team2}`,m.markets[0].name)}>{r.name?.split(' ')[1]||r.name?.slice(0,6)}<br/>{fo(r.odds?.backs?.[2]?.p||2)}</button>)}</div>
        </div>)}
      </>}

      {/* CRICKET */}
      {sportTab==='cr'&&<>
        <div className="sec-hdr">🏏 Cricket</div>
        {(data.crMatches||[]).map(m=><div key={m.id} className="ev-row">
          <div className="ev-info"><div className="ev-time">{m.status==='inplay'&&<span className="ev-live-b">● LIVE</span>}<span style={{marginLeft:4}}>{m.league}</span></div><div className="ev-name">{m.team1} v {m.team2} {m.status==='inplay'&&`[${m.score}]`}</div></div>
          <div className="ev-odds">{m.markets?.[0]?.runners?.slice(0,2).map(r=><button key={r.id} className="ev-ob ev-bk" onClick={()=>addToSlip(r.name,r.odds?.backs?.[2]?.p||2,r.odds?.backs?.[2]?.s||100,'back',`${m.team1} v ${m.team2}`,m.markets[0].name)}>{r.name?.slice(0,8)}<br/>{fo(r.odds?.backs?.[2]?.p||2)}</button>)}</div>
        </div>)}
      </>}

      {/* GOLF */}
      {sportTab==='gf'&&<>
        {(data.golfTournaments||[]).map(t=><React.Fragment key={t.id}>
          <div className="sec-hdr">⛳ {t.name}<span style={{opacity:.6,fontSize:10}}>Tournament Winner</span></div>
          {t.runners?.map((r,idx)=><div key={r.id} className="ev-row">
            <div className="ev-info" style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:22,height:22,borderRadius:'50%',background:idx<3?['#FFD700','#C0C0C0','#CD7F32'][idx]:'#f0f0f0',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:10,flexShrink:0,color:idx<3?'#000':'#888'}}>{idx+1}</div><div><div className="ev-name">{r.name}</div></div></div>
            <div className="ev-odds"><button className="ev-ob ev-bk" onClick={()=>addToSlip(r.name,r.odds?.backs?.[2]?.p||5,r.odds?.backs?.[2]?.s||100,'back',t.name,'Tournament Winner')}>{fo(r.odds?.backs?.[2]?.p||5)}</button><button className="ev-ob ev-ly" onClick={()=>addToSlip(r.name,r.odds?.lays?.[0]?.p||5.1,r.odds?.lays?.[0]?.s||80,'lay',t.name,'Tournament Winner')}>{fo(r.odds?.lays?.[0]?.p||5.1)}</button></div>
          </div>)}
        </React.Fragment>)}
      </>}
    </div>

    {/* RIGHT — BET SLIP */}
    <div className="exch-right">
      <div className="bs2">
        <div className="bs2-title"><span>Bet Slip{exSlip.length>0&&<span style={{background:'#1565C0',color:'#fff',borderRadius:'50%',width:18,height:18,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,marginLeft:5}}>{exSlip.length}</span>}</span>{exSlip.length>0&&<button style={{background:'none',border:'1px solid #dee2e6',borderRadius:3,padding:'2px 8px',fontSize:10,cursor:'pointer'}} onClick={()=>setExSlip([])}>Clear</button>}</div>
        <div className="bs2-tabs">{[['slip',`Slip${exSlip.length>0?` (${exSlip.length})`:''}`],['open',`Open${openBets.length>0?` (${openBets.length})`:''}`],['settled','Settled']].map(([k,l])=><div key={k} className={`bs2t${bsTab===k?' on':''}`} onClick={()=>setBsTab(k)}>{l}</div>)}</div>
        {bsTab==='slip'&&<>
          {exSlip.length===0&&<div className="bs2-empty">Click Back/Lay to add selections</div>}
          {exSlip.map(b=><div key={b.id} className="bs2-item"><div className={b.type==='back'?'bs2-bk-h':'bs2-ly-h'}><span>{b.type.toUpperCase()} — {b.runner}</span><button style={{background:'none',border:'none',cursor:'pointer',color:'inherit',fontSize:14}} onClick={()=>setExSlip(p=>p.filter(x=>x.id!==b.id))}>✕</button></div>
            <div className="bs2-body">
              <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{b.runner}</div>
              <div style={{fontSize:10,color:'#888',marginBottom:7}}>{b.event}</div>
              <div className="bs2-row"><span className="bs2-lbl">Odds</span><input className="bs2-inp" type="number" value={b.odds} step=".01" min="1.01" onChange={e=>updOdds(b.id,e.target.value)}/></div>
              <div className="bs2-row"><span className="bs2-lbl">Stake</span><input className="bs2-inp" type="number" value={b.stake||''} placeholder="0.00" onChange={e=>updStake(b.id,e.target.value)}/></div>
              <div className="bs2-quick">{[5,10,25,50,100].map(v=><button key={v} className="bs2-q" onClick={()=>updStake(b.id,(b.stake||0)+v)}>+₨{v}</button>)}</div>
              {b.stake>0&&<div className={`bs2-profit ${b.type==='back'?'bs2-bkp':'bs2-lyp'}`}>{b.type==='back'?<><span>Profit:</span><b style={{color:'#1b5e20'}}>+₨{((b.stake||0)*(b.odds-1)).toFixed(2)}</b></>:<><span>Liability:</span><b style={{color:'#b71c1c'}}>-₨{((b.stake||0)*(b.odds-1)).toFixed(2)}</b></>}</div>}
            </div></div>)}
          {exSlip.length>0&&<><div style={{background:'#f8f9fa',borderRadius:6,padding:'8px 10px',marginBottom:8,fontSize:11}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span>Total stake:</span><span>₨{totStake.toFixed(2)}</span></div>{totPot>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span>Potential returns:</span><span style={{color:'#1b5e20',fontWeight:700}}>₨{(totStake+totPot).toFixed(2)}</span></div>}{totLiab>0&&<div style={{display:'flex',justifyContent:'space-between'}}><span>Liability:</span><span style={{color:'#b71c1c',fontWeight:700}}>-₨{totLiab.toFixed(2)}</span></div>}</div><button className="bs2-place bs2-go-bk" onClick={placeAll}>Place Bets (₨{totStake.toFixed(2)})</button></>}
        </>}
        {bsTab==='open'&&<>{openBets.length===0&&<div className="bs2-empty">No open bets</div>}{openBets.map(b=><div key={b.id} className="mb-item"><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:11,fontWeight:700,color:b.type==='back'?'#1565C0':'#C62828'}}>{b.type.toUpperCase()}</span><span style={{fontSize:10,color:'#888'}}>{b.time}</span></div><div style={{fontSize:12,fontWeight:600}}>{b.runner}</div><div style={{fontSize:11,color:'#888',marginTop:2}}>@ {b.odds} | ₨{b.stake} | <span style={{background:'#e8f5e9',color:'#1b5e20',padding:'1px 5px',borderRadius:3,fontSize:10,fontWeight:700}}>MATCHED</span></div></div>)}</>}
        {bsTab==='settled'&&<>{settled.length===0&&<div className="bs2-empty">No settled bets</div>}{settled.slice(-15).reverse().map(b=><div key={b.id} className="mb-item"><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:11,fontWeight:700,color:b.type==='back'?'#1565C0':'#C62828'}}>{b.type.toUpperCase()}</span><span style={{fontSize:10,fontWeight:700,padding:'1px 5px',borderRadius:3,background:b.status==='won'?'#e8f5e9':'#ffebee',color:b.status==='won'?'#1b5e20':'#b71c1c'}}>{b.status.toUpperCase()}</span></div><div style={{fontSize:12,fontWeight:600}}>{b.runner}</div><div style={{fontSize:11,color:'#888',marginTop:2}}>@ {b.odds} | {b.status==='won'?<span style={{color:'#1b5e20',fontWeight:700}}>+₨{(b.stake*(b.odds-1)).toFixed(0)}</span>:<span style={{color:'#b71c1c',fontWeight:700}}>-₨{b.stake}</span>}</div></div>)}</>}
      </div>
    </div>
  </div>;
}

// ─── MAIN APP ─────────────────────────────────────────────────
const GAMES_LIST=[
  {id:'holdem',name:"Hold'em",art:'🃏',bg:'#0d2a0d'},
  {id:'turbo_holdem',name:"Turbo Hold'em",art:'⚡',bg:'#2a1a00'},
  {id:'blackjack',name:'BlackJack',art:'🃏',bg:'#1a0505'},
  {id:'turbo_bj',name:'Turbo BlackJack',art:'⚡',bg:'#2a0808'},
  {id:'baccarat',name:'Baccarat',art:'🎴',bg:'#0a2010'},
  {id:'turbo_bac',name:'Turbo Baccarat',art:'⚡',bg:'#1a0a05'},
  {id:'hilo',name:'Hi Lo',art:'🃏',bg:'#050a1a'},
  {id:'turbo_hilo',name:'Turbo HiLo',art:'⚡',bg:'#1a051a'},
  {id:'omaha',name:'Omaha Hi',art:'🃏',bg:'#1a0a00'},
  {id:'derby',name:'Derby Race',art:'🐎',bg:'#031505'},
  {id:'turbo_derby',name:'Derby Race Turbo',art:'⚡',bg:'#052505'},
];
const LOBBY_TABS=['Lobby',...GAMES_LIST.map(g=>g.name)];
const INIT_USERS=[{id:1,name:'Ali Khan',email:'ali@test.com',pw:'1234',bal:15000,status:'active'},{id:2,name:'Sara Ahmed',email:'sara@test.com',pw:'1234',bal:3200,status:'active'}];

function App(){
  const [user,setUser]=useState(null);
  const [bal,setBal]=useState(15000);
  const [gameStates,setGameStates]=useState({});
  const [sportsData,setSportsData]=useState(null);
  const [wsConnected,setWsConnected]=useState(false);
  const [mode,setMode]=useState('lobby'); // lobby|game|exchange
  const [activeGame,setActiveGame]=useState(null);
  const [lobTab,setLobTab]=useState('Lobby');
  const [toasts,setToasts]=useState([]);
  const [walletOpen,setWalletOpen]=useState(false);
  const [loginTab,setLoginTab]=useState('in');
  const [email,setEmail]=useState('');const [pw,setPw]=useState('');
  const [rn,setRn]=useState('');const [re,setRe]=useState('');const [rp,setRp]=useState('');
  const [err,setErr]=useState('');
  const ws=useRef(null);
  const reconnectTimer=useRef(null);

  function addToast(msg,type='info'){const id=++toastId;setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);}

  // ── WebSocket connection ──
  function connectWS(){
    if(ws.current&&ws.current.readyState===WebSocket.OPEN)return;
    try{
      const socket=new WebSocket(WS_URL);
      socket.onopen=()=>{setWsConnected(true);addToast('🟢 Connected to live server','info');clearTimeout(reconnectTimer.current);};
      socket.onmessage=(e)=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.type==='state'){
            setGameStates(p=>({...p,[msg.game]:msg.state}));
          } else if(msg.type==='timer'){
            setGameStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),timer:msg.timer,phase:msg.phase}}));
          } else if(msg.type==='odds'){
            setGameStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),odds:msg.odds,...(msg.sizes?{sizes:msg.sizes}:{}),...(msg.extraOdds?{extraOdds:msg.extraOdds}:{})}}));
          } else if(msg.type==='positions'){
            setGameStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),positions:msg.positions,raceOrder:msg.raceOrder}}));
          } else if(msg.type==='sports'){
            setSportsData(msg.data);
          } else if(msg.type==='bet_confirmed'){
            addToast('✅ Bet confirmed by server','bet');
          } else if(msg.type==='bet_rejected'){
            addToast(`❌ Bet rejected: ${msg.reason}`,'lose');
          }
        }catch(err){}
      };
      socket.onclose=()=>{setWsConnected(false);ws.current=null;reconnectTimer.current=setTimeout(connectWS,3000);};
      socket.onerror=()=>socket.close();
      ws.current=socket;
    }catch(e){reconnectTimer.current=setTimeout(connectWS,3000);}
  }

  useEffect(()=>{connectWS();return()=>{clearTimeout(reconnectTimer.current);ws.current?.close();};},[]);

  function sendBet(betData){
    if(!ws.current||ws.current.readyState!==WebSocket.OPEN){addToast('Not connected to server','lose');return;}
    ws.current.send(JSON.stringify({type:'bet',userId:user?.id||'guest',...betData}));
  }

  function login(){const u=INIT_USERS.find(u=>u.email===email&&u.pw===pw);if(!u){setErr('Invalid credentials');return;}setUser(u);setBal(u.bal);}
  function register(){if(!rn||!re||!rp){setErr('All fields required');return;}setUser({id:Date.now(),name:rn,email:re,pw:rp,bal:1000,status:'active'});setBal(1000);addToast('🎉 Welcome! ₨1,000 bonus!','win');}
  function logout(){setUser(null);setMode('lobby');setActiveGame(null);}

  const filtered=lobTab==='Lobby'?GAMES_LIST:GAMES_LIST.filter(g=>g.name===lobTab);

  if(!user)return <>
    <div className="login-bg">
      <div className="login-box">
        <div className="l-logo">MOT777</div>
        <div className="l-sub">LIVE CARD GAME EXCHANGE</div>
        <div style={{textAlign:'center',marginBottom:16}}><span className={`ws-status ${wsConnected?'ws-on':'ws-off'}`}>{wsConnected?'🟢 Server Connected':'🔴 Connecting...'}</span></div>
        {err&&<div className="l-err">⚠️ {err}</div>}
        <div className="l-tabs"><div className={`l-tab${loginTab==='in'?' on':''}`} onClick={()=>{setLoginTab('in');setErr('')}}>SIGN IN</div><div className={`l-tab${loginTab==='up'?' on':''}`} onClick={()=>{setLoginTab('up');setErr('')}}>REGISTER</div></div>
        {loginTab==='in'?<><input className="l-inp" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ali@test.com"/><input className="l-inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/><button className="l-btn" onClick={login}>SIGN IN</button><div className="l-hint">Demo: ali@test.com / 1234</div></>
        :<><input className="l-inp" value={rn} onChange={e=>setRn(e.target.value)} placeholder="Full name"/><input className="l-inp" value={re} onChange={e=>setRe(e.target.value)} placeholder="Email"/><input className="l-inp" type="password" value={rp} onChange={e=>setRp(e.target.value)} placeholder="Password"/><button className="l-btn" onClick={register}>CREATE ACCOUNT</button><div className="l-bonus">🎁 Get ₨1,000 Welcome Bonus!</div></>}
      </div>
    </div>
    <Toasts items={toasts}/>
  </>;

  return <>
    <div className="topbar">
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {mode!=='lobby'&&<button onClick={()=>setMode('lobby')} style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',padding:'0 4px'}}>←</button>}
        <div className="tb-logo"><div className="live-dot"/>MOT777{mode==='game'&&activeGame?` — ${activeGame.name}`:''}</div>
        <span className={`ws-status ${wsConnected?'ws-on':'ws-off'}`}>{wsConnected?'LIVE':'OFFLINE'}</span>
      </div>
      <div className="tb-btns">
        <div className="tb-bal">₨{bal.toLocaleString()}</div>
        <button className="tb-btn tb-dep" onClick={()=>setWalletOpen(true)}>+ DEP</button>
        <button className="tb-btn" onClick={logout} style={{borderColor:'rgba(255,100,100,.3)',color:'rgba(255,150,150,.75)'}}>EXIT</button>
      </div>
    </div>

    {/* MODE NAV */}
    <div className="mode-nav">
      <div className={`mn${mode==='lobby'?' on':''}`} onClick={()=>setMode('lobby')}>🎰 GAMES</div>
      <div className={`mn${mode==='exchange'?' ex-on':''}`} onClick={()=>setMode('exchange')}>📊 EXCHANGE</div>
      {GAMES_LIST.map(g=><div key={g.id} className={`mn${mode==='game'&&activeGame?.id===g.id?' on':''}`} onClick={()=>{setActiveGame(g);setMode('game');}}>⚡ {g.name}</div>)}
    </div>

    {/* LOBBY */}
    {mode==='lobby'&&<>
      <div className="lobby-tabs">{LOBBY_TABS.map(t=><button key={t} className={`lt${lobTab===t?' on':''}`} onClick={()=>setLobTab(t)}>{t}</button>)}</div>
      <div className="lobby-grid">{filtered.map(g=><div key={g.id} className="game-tile" onClick={()=>{setActiveGame(g);setMode('game');}}>
        <div className="gt-art" style={{background:`linear-gradient(135deg,${g.bg},${g.bg}cc)`}}><span style={{fontSize:50}}>{g.art}</span><div className="gt-play">▶</div></div>
        <div className="gt-name">{g.name}</div>
      </div>)}</div>
      {/* Server status */}
      {!wsConnected&&<div style={{background:'#ffebee',border:'1px solid #ef9a9a',borderRadius:8,padding:'12px 16px',margin:'12px',fontSize:13,color:'#b71c1c'}}>
        ⚠️ <b>Server not connected.</b> Games require the Node.js server to run.<br/>
        <span style={{fontSize:11,marginTop:4,display:'block'}}>Run: <code style={{background:'rgba(0,0,0,.08)',padding:'1px 6px',borderRadius:3}}>npm install && node server.js</code> in the server folder.</span>
      </div>}
    </>}

    {/* LIVE GAME */}
    {mode==='game'&&activeGame&&<GameView
      key={activeGame.id}
      gameKey={activeGame.id}
      state={gameStates[activeGame.id]}
      sendBet={sendBet}
      bal={bal}
      addToast={addToast}
    />}

    {/* SPORTS EXCHANGE */}
    {mode==='exchange'&&<ExchangeView sports={sportsData} bal={bal} addToast={addToast}/>}

    {/* WALLET */}
    {walletOpen&&<div className="w-overlay" onClick={()=>setWalletOpen(false)}>
      <div className="w-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}><div style={{fontSize:16,fontWeight:800,color:'#1a3a5c'}}>💳 Wallet</div><button style={{background:'#f0f0f0',border:'none',width:30,height:30,borderRadius:'50%',cursor:'pointer',fontSize:18}} onClick={()=>setWalletOpen(false)}>✕</button></div>
        <div style={{background:'linear-gradient(135deg,#1a3a5c,#0d2137)',borderRadius:12,padding:16,color:'#fff',display:'flex',justifyContent:'space-between',marginBottom:16}}><div><div style={{fontSize:11,opacity:.7,marginBottom:2}}>BALANCE</div><div style={{fontSize:24,fontWeight:900,color:'var(--gold)'}}>₨{bal.toLocaleString()}</div></div><span style={{fontSize:36}}>💰</span></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>{[500,1000,2000,5000,10000].map(v=><button key={v} style={{background:'#f0f0f0',border:'1px solid #e0e0e0',borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}} onClick={()=>{setBal(b=>b+v);addToast(`✅ ₨${v.toLocaleString()} deposited`,'win');setWalletOpen(false);}}>+₨{v.toLocaleString()}</button>)}</div>
        <button style={{width:'100%',padding:12,border:'none',borderRadius:8,background:'var(--teal)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer'}} onClick={()=>setWalletOpen(false)}>CLOSE</button>
      </div>
    </div>}

    <Toasts items={toasts}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
