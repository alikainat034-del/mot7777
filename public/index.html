<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MOT777 Live</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--green:#00C853;--teal:#00897B;--dark:#0d1f0d;--back:#1565C0;--back-lt:#BBDEFB;--lay:#C62828;--lay-lt:#FFCDD2;--gold:#FFD700;--red:#E53935;--navy:#1a3a5c}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f0f0;min-height:100vh;overflow-x:hidden}
.topbar{background:linear-gradient(90deg,#1a3a5c,#0d2137);color:#fff;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.tb-logo{font-weight:900;font-size:20px;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-bal{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 12px;font-size:13px;font-weight:700}
.tb-btns{display:flex;gap:6px;align-items:center}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s}
.tb-btn:hover{background:rgba(255,255,255,.1)}
.ws-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:800}
.ws-on{background:rgba(0,200,83,.2);color:#00e676;border:1px solid rgba(0,200,83,.3)}
.ws-off{background:rgba(255,59,92,.2);color:#ff5252;border:1px solid rgba(255,59,92,.3)}
.mode-nav{background:#0d2137;display:flex;overflow-x:auto;flex-shrink:0}
.mode-nav::-webkit-scrollbar{height:0}
.mn{padding:9px 14px;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0}
.mn:hover{color:#fff}
.mn.on{color:var(--gold);border-bottom-color:var(--gold)}
.lobby-tabs{background:#1a3a5c;padding:6px 10px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0}
.lobby-tabs::-webkit-scrollbar{height:0}
.lt{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:6px 13px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .2s;flex-shrink:0}
.lt.on{background:var(--green);border-color:var(--green);color:#fff}
.lobby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0;background:#ddd}
.game-tile{background:#fff;cursor:pointer;border:1px solid #e8e8e8;transition:all .2s;position:relative;overflow:hidden}
.game-tile:hover{box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:2}
.gt-art{height:115px;display:flex;align-items:center;justify-content:center;position:relative}
.gt-play{position:absolute;width:42px;height:42px;background:rgba(0,200,83,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;opacity:0;transition:opacity .2s}
.game-tile:hover .gt-play{opacity:1}
.gt-name{padding:8px 10px 10px;text-align:center;font-size:12px;font-weight:700;color:#00897B}
.gt-hot{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.5px}
/* GAME SCREEN */
.game-screen{display:flex;flex-direction:column;height:calc(100vh - 95px);overflow:hidden}
.gm-hdr{background:#1a3a5c;color:#fff;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gm-hdr-left{display:flex;align-items:center;gap:10px}
.gm-id{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5}
.gm-id b{font-size:13px;color:#fff;display:block}
.tc{position:relative;width:44px;height:44px;flex-shrink:0}
.tc svg{position:absolute;inset:0;transform:rotate(-90deg)}
.tc-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.phase-banner{padding:6px 12px;text-align:center;font-size:11px;font-weight:800;letter-spacing:1px;flex-shrink:0}
.pb-wait{background:#333;color:rgba(255,255,255,.5)}
.pb-pre{background:#1a3a5c;color:rgba(255,255,255,.85)}
.pb-flop{background:#0d5c1a;color:#69f0ae}
.pb-turn{background:#5c3d00;color:#ffd740}
.pb-river{background:#5c0d0d;color:#ff8a80}
.pb-result{background:#2d1b5c;color:#b39ddb}
.gtabs{display:flex;background:#0d2137;flex-shrink:0}
.gtab{padding:8px 15px;font-size:12px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.gtab.on{color:#fff;border-bottom-color:var(--green)}
.game-content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.card-table{background:#0d1f0d;padding:10px 12px;flex-shrink:0}
.ct-label{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1.5px;text-align:center;margin-bottom:5px}
.ct-community{background:rgba(0,0,0,.35);border:1px solid rgba(0,200,83,.2);border-radius:10px;padding:7px 10px;display:flex;justify-content:center;gap:4px;min-height:62px;align-items:center;margin-bottom:8px;position:relative}
.ct-stage{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;font-size:9px;font-weight:700;padding:1px 8px;border-radius:10px;letter-spacing:1px;white-space:nowrap}
.ct-hands{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ct-hand{background:rgba(0,0,0,.3);border:1px solid rgba(0,200,83,.2);border-radius:8px;padding:6px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .4s}
.ct-hand.winning{border-color:var(--gold);box-shadow:0 0 14px rgba(255,215,0,.4)}
.ct-hand-lbl{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:.5px}
.ct-cards{display:flex;gap:3px;justify-content:center;min-height:50px;align-items:center}
.pcard{border-radius:4px;background:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:2px 3px;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.4);animation:deal .2s ease-out;flex-shrink:0}
.pcard.red{color:#C62828}.pcard.blk{color:#111}
.pcard.down{background:linear-gradient(135deg,#1e3a6e,#0d2448);border:1px solid rgba(100,150,255,.3)}
@keyframes deal{from{transform:translateY(-14px) scale(.85);opacity:0}to{transform:none;opacity:1}}
.odds-table{background:#fff;flex:1}
.ot-section{border-bottom:2px solid #333}
.ot-header{display:grid;grid-template-columns:1fr 86px 86px;background:#fff}
.ot-hcol{padding:7px 4px;text-align:center;font-size:11px;font-weight:900}
.ot-hback{background:var(--back);color:#fff}
.ot-hlay{background:var(--lay);color:#fff}
.ot-row{display:grid;grid-template-columns:1fr 86px 86px;border-bottom:1px solid #ececec;min-height:54px;align-items:center}
.ot-name{padding:8px 12px;font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.3}
.ot-cell{padding:3px;display:flex;align-items:center;justify-content:center;height:54px}
.odds-btn{width:80px;height:48px;border:none;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .12s;font-family:inherit}
.odds-btn:active{transform:scale(.95)}
.ob-back{background:var(--back-lt);color:var(--back)}
.ob-back:hover{background:#90CAF9}
.ob-lay{background:var(--lay-lt);color:var(--lay)}
.ob-lay:hover{background:#EF9A9A}
.ob-price{font-size:16px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
.ob-size{font-size:10px;opacity:.65;line-height:1}
.ob-flash{animation:flash .35s ease}
@keyframes flash{50%{filter:brightness(1.4)}}
.round-over{color:var(--red);font-size:12px;font-weight:900;letter-spacing:.5px;text-align:center;width:100%}
.suspended{background:#f5f5f5;border:none;border-radius:4px;width:80px;height:48px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:10px;font-weight:700}
.mb-hdr{background:#1a3a5c;color:#fff;padding:7px 12px;font-size:11px;font-weight:700;flex-shrink:0}
.mb-cols{display:grid;grid-template-columns:1fr 70px 70px;padding:6px 12px;font-size:10px;font-weight:700;color:#888;border-bottom:1px solid #eee}
.mb-row{display:grid;grid-template-columns:1fr 70px 70px;padding:7px 12px;font-size:12px;border-bottom:1px solid #f5f5f5}
/* BET SLIP */
.bsp-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.bsp{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:18px 16px 24px;box-shadow:0 -6px 30px rgba(0,0,0,.3);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bsp-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.bsp-type{font-size:13px;font-weight:900}
.bsp-type.back{color:var(--back)}.bsp-type.lay{color:var(--lay)}
.bsp-runner{font-size:15px;font-weight:700;color:#1a1a1a;margin-top:2px}
.bsp-event{font-size:11px;color:#888;margin-top:1px}
.bsp-x{background:#f0f0f0;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bsp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bsp-lbl{font-size:10px;font-weight:800;color:#888;letter-spacing:1px;width:44px;flex-shrink:0}
.bsp-inp{flex:1;border:2px solid #e0e0e0;border-radius:8px;padding:10px 12px;font-size:20px;font-weight:800;text-align:center;outline:none;font-variant-numeric:tabular-nums}
.bsp-inp.back:focus{border-color:var(--back)}
.bsp-inp.lay:focus{border-color:var(--lay)}
.bsp-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.bsp-q{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer}
.bsp-profit{border-radius:8px;padding:9px 14px;display:flex;justify-content:space-between;font-size:12px;margin-bottom:14px}
.bsp-profit.back{background:#e3f2fd;border:1px solid #90caf9}
.bsp-profit.lay{background:#ffebee;border:1px solid #ef9a9a}
.bsp-place{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer}
.bsp-place.back{background:var(--back);color:#fff}
.bsp-place.lay{background:var(--lay);color:#fff}
/* TOASTS */
.toasts{position:fixed;top:56px;right:10px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:280px}
.toast{border-radius:8px;padding:10px 14px;font-size:12px;font-weight:600;animation:tin .3s ease;box-shadow:0 4px 14px rgba(0,0,0,.25)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.t-win{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20}
.t-lose{background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c}
.t-bet{background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1}
.t-info{background:#fff8e1;border:1px solid #ffe082;color:#e65100}
/* EXCHANGE */
.exch-layout{display:grid;grid-template-columns:180px 1fr 250px;height:calc(100vh - 95px)}
.exch-left{background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto}
.exch-center{background:#f0f2f5;overflow-y:auto}
.exch-right{background:#fff;border-left:1px solid #e0e0e0;overflow-y:auto}
.els-hdr{padding:7px 10px;background:#f8f9fa;font-size:10px;font-weight:700;color:#6c757d;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #e9ecef}
.els-row{padding:7px 10px 7px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:2px solid transparent;transition:all .1s;font-size:12px}
.els-row:hover{background:#f0f7ff}
.els-row.on{background:#e8f4ff;color:#1565C0;font-weight:700;border-left-color:#1565C0}
.els-cnt{background:#f5f5f5;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;color:#888}
.els-live{background:#e8f5e9;color:#00875a;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.sec-hdr{background:#1a3a5c;color:#fff;padding:7px 12px;font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.ev-row{background:#fff;border-bottom:1px solid #ececec;display:flex;align-items:stretch;cursor:pointer;transition:background .1s}
.ev-row:hover{background:#f0f7ff}
.ev-info{flex:1;padding:8px 12px;min-width:0}
.ev-time{font-size:10px;color:#6c757d;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.ev-live-b{font-size:9px;font-weight:700;color:#00875a;background:#e8f5e9;padding:1px 5px;border-radius:3px}
.ev-name{font-size:12px;font-weight:600;color:#212529;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-mkt{font-size:10px;color:#6c757d;margin-top:2px}
.ev-odds{display:flex;gap:4px;align-items:center;padding:8px 8px 8px 0;flex-shrink:0}
.ev-ob{padding:5px 8px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:monospace;min-width:48px;text-align:center;transition:all .12s}
.ev-bk{background:#BBDEFB;color:#1565C0}.ev-bk:hover{background:#90CAF9}
.ev-ly{background:#FFCDD2;color:#C62828}.ev-ly:hover{background:#EF9A9A}
.mkt-hdr2{background:#fff;padding:10px 14px;border-bottom:1px solid #dee2e6}
.mkt-title2{font-size:14px;font-weight:700;margin-bottom:3px}
.mkt-meta2{font-size:11px;color:#6c757d;display:flex;gap:10px;flex-wrap:wrap}
.ot2{width:100%;border-collapse:collapse}
.ot2 thead th{background:#f8f9fa;font-size:10px;font-weight:700;color:#6c757d;padding:6px 8px;text-align:center;border-bottom:1px solid #dee2e6;text-transform:uppercase}
.ot2 thead th.rcol{text-align:left;padding-left:12px}
.ot2 thead .bkh{background:#BBDEFB;color:#0d47a1}
.ot2 thead .lyh{background:#FFCDD2;color:#7f0000}
.ot2 tbody tr{border-bottom:1px solid #f0f0f0}
.ot2 tbody tr:hover{background:#fafbfc}
.runner-td{padding:8px 12px;min-width:160px}
.rn2{font-weight:700;font-size:12px}
.ri2{font-size:10px;color:#6c757d;margin-top:1px}
.form-dot{width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;color:#fff}
.fd-w{background:#28a745}.fd-p{background:#fd7e14}.fd-f{background:#dc3545}.fd-x{background:#adb5bd}
.oc2{padding:3px;width:68px;text-align:center}
.ob2{width:100%;padding:5px 2px;border-radius:4px;border:none;cursor:pointer;font-family:monospace;transition:all .12s}
.ob2.bk{background:#BBDEFB;color:#1565C0}.ob2.bk:hover,.ob2.bk.best{background:#1565C0;color:#fff;font-weight:700}
.ob2.ly{background:#FFCDD2;color:#C62828}.ob2.ly:hover,.ob2.ly.best{background:#C62828;color:#fff;font-weight:700}
.ob2-p{font-size:13px;font-weight:700;display:block}
.ob2-s{font-size:9px;opacity:.65;display:block;margin-top:1px}
.ltp2{padding:0 8px;text-align:center;font-size:11px;color:#6c757d;font-family:monospace}
.inplay-bar{background:linear-gradient(90deg,#e8f5e9,#f0fff4);border-left:3px solid #00875a;padding:7px 12px;font-size:11px;font-weight:600;color:#00875a;display:flex;align-items:center;gap:6px}
.tab2-bar{display:flex;background:#fff;border-bottom:1px solid #dee2e6;padding:0 12px}
.tab2{padding:9px 14px;cursor:pointer;font-size:12px;font-weight:600;color:#6c757d;border-bottom:2px solid transparent;transition:all .15s}
.tab2.on{color:#1565C0;border-bottom-color:#1565C0}
.race-scroll{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #dee2e6}
.race-scroll::-webkit-scrollbar{height:0}
.rs-itm{padding:7px 12px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;text-align:center;transition:all .15s;min-width:78px;flex-shrink:0}
.rs-itm:hover{background:#f8f9fa}
.rs-itm.on{border-bottom-color:#1565C0;background:#f0f7ff}
.rs-t{font-size:11px;font-weight:700;color:#212529}
.rs-v{font-size:10px;color:#6c757d;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78px}
.rs-s{font-size:9px;font-weight:700;margin-top:2px}
.rs-live{color:#00875a}.rs-open{color:#6c757d}
/* BET SLIP EXCHANGE */
.bs2{padding:10px}
.bs2-title{font-size:13px;font-weight:700;color:#212529;margin-bottom:8px;display:flex;justify-content:space-between}
.bs2-tabs{display:flex;gap:3px;background:#f0f0f0;border-radius:4px;padding:3px;margin-bottom:10px}
.bs2t{flex:1;padding:5px;text-align:center;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;color:#888;transition:all .15s}
.bs2t.on{background:#fff;color:#212529;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bs2-empty{text-align:center;padding:28px 10px;color:#888;font-size:12px}
.bs2-item{border-radius:6px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bs2-bk-h{background:#BBDEFB;color:#0d47a1;padding:7px 10px;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.bs2-ly-h{background:#FFCDD2;color:#7f0000;padding:7px 10px;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.bs2-body{background:#fff;padding:8px 10px;border:1px solid #e9ecef;border-top:none;border-radius:0 0 6px 6px}
.bs2-inp{flex:1;border:1px solid #dee2e6;border-radius:4px;padding:5px 8px;font-size:13px;font-weight:700;font-family:monospace;text-align:center;outline:none;color:#212529}
.bs2-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.bs2-lbl{font-size:10px;color:#888;width:36px;flex-shrink:0;font-weight:600}
.bs2-quick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.bs2-q{background:#f8f9fa;border:1px solid #dee2e6;border-radius:3px;padding:3px 7px;font-size:10px;font-weight:700;cursor:pointer}
.bs2-profit{font-size:11px;padding:5px 8px;border-radius:4px;display:flex;justify-content:space-between}
.bs2-bkp{background:#e3f2fd;color:#0d47a1}
.bs2-lyp{background:#ffebee;color:#7f0000}
.bs2-place{width:100%;padding:9px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700;margin-top:6px}
.bs2-go-bk{background:#1565C0;color:#fff}
.bs2-go-ly{background:#C62828;color:#fff}
.mb-item{background:#fff;border:1px solid #e9ecef;border-radius:6px;padding:9px;margin-bottom:6px}
/* AVIATOR */
.av-screen{display:flex;flex-direction:column;height:calc(100vh - 95px);background:#0a0a1a;color:#fff;overflow:hidden}
.av-header{background:#0d1030;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.av-hist{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#070715;flex-shrink:0;overflow-x:auto}
.av-hist::-webkit-scrollbar{height:0}
.av-hist-pill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:monospace}
.av-canvas-wrap{flex:1;position:relative;background:linear-gradient(180deg,#020A18,#041530);overflow:hidden;min-height:200px}
.av-mult-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.av-mult-num{font-size:68px;font-weight:900;line-height:1;font-family:monospace;transition:color .3s}
.av-mult-lbl{font-size:11px;letter-spacing:3px;opacity:.6;margin-top:4px}
.av-controls{background:#0d1030;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0}
.av-ctrl-box{background:#070715;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px}
.av-ctrl-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:6px;font-weight:700}
.av-inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:6px;padding:8px 12px;font-size:16px;font-weight:700;width:100%;margin-bottom:8px;font-family:monospace;text-align:center;outline:none}

.av-cashout-btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#FFD700,#FFA000);color:#000;animation:pulse2 .8s infinite}

/* LAHORE */
.lahore-screen{display:flex;flex-direction:column;height:calc(100vh - 95px);background:#f0f2f5;overflow:hidden}
.lahore-stream{background:#000;flex:0 0 auto;position:relative}
.lahore-stream iframe{width:100%;height:220px;border:none;display:block}
.lahore-races{flex:1;overflow-y:auto}
.lahore-race-card{background:#fff;border-radius:10px;margin:10px 12px;border:1px solid #e0e0e0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.lrc-hdr{background:#1a3a5c;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.lrc-name{font-size:13px;font-weight:800}
.lrc-time{font-size:11px;opacity:.7}
.lrc-status{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px}
.lrcs-open{background:rgba(0,200,83,.2);color:#00e676}
.lrcs-result{background:rgba(255,215,0,.2);color:#FFD700}
.lrc-table{width:100%;border-collapse:collapse}
.lrc-table th{background:#f8f9fa;font-size:10px;font-weight:700;color:#6c757d;padding:7px 10px;text-align:left;letter-spacing:.5px}
.lrc-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:12px}
.lrc-table tr:last-child td{border-bottom:none}
.lrc-odds-cell{display:flex;gap:4px}
.lrc-back-btn{background:#BBDEFB;color:#1565C0;border:none;border-radius:4px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace}
.lrc-lay-btn{background:#FFCDD2;color:#C62828;border:none;border-radius:4px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace}
.lrc-winner{background:rgba(255,215,0,.1);color:#8a6400;font-weight:800;font-size:11px;padding:2px 8px;border-radius:3px}
.lrc-empty{text-align:center;padding:32px;color:#888}
/* LOGIN */
.login-page{min-height:100vh;background:linear-gradient(135deg,#0f2340,#1a3a5c);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:34px 26px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.l-logo{font-size:36px;font-weight:900;text-align:center;color:var(--gold);letter-spacing:4px;margin-bottom:4px;font-family:monospace}
.l-sub{text-align:center;color:#888;font-size:10px;letter-spacing:3px;margin-bottom:20px}
.l-tabs{display:flex;gap:3px;background:#f0f0f0;border-radius:8px;padding:3px;margin-bottom:16px}
.l-tab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;font-weight:800;color:#888;transition:all .2s}
.l-tab.on{background:#fff;color:#1a3a5c;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.l-inp{width:100%;border:2px solid #e0e0e0;border-radius:8px;padding:10px 13px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit}
.l-inp:focus{border-color:#00897B}
.l-btn{width:100%;padding:12px;border:none;border-radius:8px;background:#00897B;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px}
.l-err{background:#ffebee;border:1px solid #ef9a9a;border-radius:6px;padding:8px 12px;color:#b71c1c;font-size:12px;margin-bottom:10px}
.l-hint{text-align:center;font-size:11px;color:#aaa}
.l-note{text-align:center;font-size:11px;color:#888;margin-top:8px;padding:8px;background:#f8f9fa;border-radius:6px}
/* RULES/RESULTS */
.results-body{padding:10px 12px;overflow-y:auto}
.res-item{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--green)}
.rules-body{padding:14px;font-size:13px;line-height:1.7;color:#333;overflow-y:auto}
.rules-body h3{font-size:14px;font-weight:800;color:#1a3a5c;margin:12px 0 6px}
@media(max-width:760px){.exch-layout{grid-template-columns:1fr}.exch-left,.exch-right{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── CONFIG ────────────────────────────────────────────────────
const WS_URL = window.location.protocol==='https:'
  ? `wss://${window.location.host}`
  : `ws://${window.location.host}`;
const API = window.location.origin;

let toastId=0;
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=(a,b)=>parseFloat((a+Math.random()*(b-a)).toFixed(2));
const fo=o=>{const n=parseFloat(o);return isNaN(n)?'—':n>=10?n.toFixed(0):n>=2?n.toFixed(1):n.toFixed(2);};
const fm=n=>n>=1000?'£'+(n/1000).toFixed(1)+'K':'£'+(n||0).toFixed(0);

// ── TIMER CIRCLE ──────────────────────────────────────────────
function TC({secs,max}){
  const R=17,C=2*Math.PI*R,pct=max>0?Math.max(0,secs/max):0;
  const stroke=secs<=5?'#FF5252':secs<=10?'#FFD740':'#69F0AE';
  return <div className="tc">
    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r={R} fill="none" stroke="rgba(255,255,255,.18)" strokeWidth="4"/><circle cx="22" cy="22" r={R} fill="none" stroke={stroke} strokeWidth="4" strokeDasharray={`${C*pct} ${C}`} strokeLinecap="round"/></svg>
    <div className="tc-num" style={{color:secs<=5?'#FF5252':'#fff'}}>{secs}</div>
  </div>;
}

// ── CARD ──────────────────────────────────────────────────────
function Card({c,w=36,h=52}){
  if(!c)return null;
  if(!c.up)return <div style={{width:w,height:h,borderRadius:4,background:'linear-gradient(135deg,#1e3a6e,#0d2448)',border:'1px solid rgba(100,150,255,.3)',flexShrink:0}}/>;
  return <div className={`pcard ${c.red?'red':'blk'}`} style={{width:w,height:h}}>
    <div style={{fontSize:w<40?9:10,lineHeight:1}}>{c.r}{c.s}</div>
    <div style={{fontSize:w<40?12:14,textAlign:'center',alignSelf:'center',lineHeight:1}}>{c.s}</div>
    <div style={{fontSize:w<40?9:10,transform:'rotate(180deg)',alignSelf:'flex-end',lineHeight:1}}>{c.r}{c.s}</div>
  </div>;
}

// ── ODDS BUTTON ───────────────────────────────────────────────
function OB({price,size,type,suspended,roundOver,onClick}){
  const [flash,setFlash]=useState(false);const prev=useRef(price);
  useEffect(()=>{if(prev.current!==price&&!suspended&&!roundOver){setFlash(true);const t=setTimeout(()=>setFlash(false),400);prev.current=price;return()=>clearTimeout(t);}},[ price]);
  if(roundOver)return <div className="ot-cell"><div className="round-over">ROUND OVER !</div></div>;
  if(suspended)return <div className="ot-cell"><div className="suspended">SUSP.</div></div>;
  return <div className="ot-cell"><button className={`odds-btn ${type==='back'?'ob-back':'ob-lay'}${flash?' ob-flash':''}`} onClick={onClick}><span className="ob-price">{fo(price)}</span><span className="ob-size">{fm(size||100)}</span></button></div>;
}

// ── BET SLIP ──────────────────────────────────────────────────
function BetSlipCard({bet,bal,onPlace,onClose}){
  const [odds,setOdds]=useState(bet.price);const [stake,setStake]=useState('');
  const s=Number(stake)||0;
  const profit=bet.type==='back'?s*(odds-1):s;const liab=bet.type==='lay'?s*(odds-1):0;
  function place(){if(!s||s<10){alert('Min stake ₨10');return;}if(s>bal){alert('Insufficient balance');return;}onPlace({...bet,odds,stake:s});}
  return <div className="bsp-ov" onClick={onClose}><div className="bsp" onClick={e=>e.stopPropagation()}>
    <div className="bsp-hdr"><div><div className={`bsp-type ${bet.type}`}>{bet.type==='back'?'BACK':'LAY'}</div><div className="bsp-runner">{bet.runner}</div><div className="bsp-event">{bet.market} — {bet.event}</div></div><button className="bsp-x" onClick={onClose}>✕</button></div>
    <div className="bsp-row"><span className="bsp-lbl">ODDS</span><input className={`bsp-inp ${bet.type}`} type="number" value={odds} step=".01" min="1.01" onChange={e=>setOdds(parseFloat(e.target.value)||odds)}/></div>
    <div className="bsp-row"><span className="bsp-lbl">STAKE</span><input className={`bsp-inp ${bet.type}`} type="number" value={stake} placeholder="₨0" onChange={e=>setStake(e.target.value)}/></div>
    <div className="bsp-quick">{[50,100,200,500,1000,2000].map(v=><button key={v} className="bsp-q" onClick={()=>setStake(p=>String((Number(p)||0)+v))}>+₨{v}</button>)}<button className="bsp-q" onClick={()=>setStake('')}>CLR</button></div>
    {s>0&&<div className={`bsp-profit ${bet.type}`}>{bet.type==='back'?<><span>Profit if wins:</span><b style={{color:'#1b5e20'}}>+₨{profit.toFixed(2)}</b></>:<><span>Liability:</span><b style={{color:'#b71c1c'}}>-₨{liab.toFixed(2)}</b></>}</div>}
    <button className={`bsp-place ${bet.type}`} onClick={place}>PLACE {bet.type.toUpperCase()} — ₨{s||'0'}</button>
  </div></div>;
}

// ── TOAST ─────────────────────────────────────────────────────
function Toasts({items}){return <div className="toasts">{items.map(t=><div key={t.id} className={`toast t-${t.type}`}>{t.msg}</div>)}</div>;}

// ── GAME VIEW ─────────────────────────────────────────────────
function GameView({gameKey,state,sendBet,bal,setBal,addToast,userId}){
  const [betSlip,setBetSlip]=useState(null);const [gameTab,setGameTab]=useState('game');const [myBets,setMyBets]=useState([]);
  if(!state)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',color:'#888',flexDirection:'column',gap:12}}><div style={{width:40,height:40,border:'4px solid #e0e0e0',borderTopColor:'#00897B',borderRadius:'50%',animation:'spin .7s linear infinite'}}/><div>Connecting to live game...</div></div>;
  const{phase,timer,gid,hands,comm,odds,sizes,extraOdds,winner,results,pH,bH,c1,c2,outcome,positions,raceOrder}=state;
  const isBetting=['pre','flop','turn','river'].includes(phase);
  const isRoundOver=!isBetting&&phase!=='wait';const isSuspended=phase==='wait';
  const PNAMES={wait:'⏳ Waiting for next round...',pre:'PRE-FLOP — Place Your Bets',flop:'FLOP — 3 Cards Revealed',turn:'TURN — 4th Card',river:'RIVER — Final Card',result:'🏆 RESULT'};
  const PCLASS={wait:'pb-wait',pre:'pb-pre',flop:'pb-flop',turn:'pb-turn',river:'pb-river',result:'pb-result'};
  const MAX={wait:8,pre:20,flop:20,turn:20,river:20,result:6};
  const isHoldem=['holdem','turbo_holdem','blackjack','turbo_bj','omaha'].includes(gameKey);
  const isBac=['baccarat','turbo_bac'].includes(gameKey);
  const isHL=['hilo','turbo_hilo'].includes(gameKey);
  const isDerby=['derby','turbo_derby'].includes(gameKey);
  const HN=['Thunder Road','Silver Arrow','Night Dancer','Golden Flame','Desert Wind','Lucky Star'];
  const HC=['#e74c3c','#3498db','#f0f0f0','#111','#f39c12','#000080'];
  const HJ=['F. Dettori','W. Buick','R. Moore','J. Spencer','P. Hanagan','T. Queally'];

  function openBet(runner,price,type,market,handIdx=null){
    if(!isBetting){addToast('Betting is closed','info');return;}
    setBetSlip({runner,price,type,market,event:`Game #${gid}`,handIdx});
  }
  async function placeBet(bet){
    // Deduct balance via API
    try{
      const r=await fetch(`${API}/api/bet/place`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,amount:bet.stake,gameKey,runner:bet.runner,betType:bet.type,odds:bet.odds})});
      const d=await r.json();
      if(!d.success){addToast(d.error||'Bet failed','lose');return;}
      setBal(d.newBalance);
    }catch(e){addToast('Server error','lose');return;}
    setMyBets(p=>[...p,{...bet,id:Date.now(),settled:false}]);
    sendBet({game:gameKey,...bet,userId});
    setBetSlip(null);
    addToast(`${bet.type==='back'?'🔵 Back':'🔴 Lay'}: ${bet.runner} @ ${bet.odds} — ₨${bet.stake}`,'bet');
  }

  // Settle my bets on result
  useEffect(()=>{
    if(phase!=='result'||!winner&&!state.winner&&!outcome)return;
    myBets.filter(b=>!b.settled).forEach(async b=>{
      let won=false;let payout=0;
      if(isHoldem&&winner){won=b.type==='back'?winner.i===b.handIdx:winner.i!==b.handIdx;payout=won?(b.type==='back'?b.stake*b.odds:b.stake*2):0;}
      if(isBac&&state.winner){const w=state.winner.w;if(b.runner==='Player')won=b.type==='back'?w==='player':w!=='player';else if(b.runner==='Banker')won=b.type==='back'?w==='banker':w!=='banker';else if(b.runner==='Tie')won=b.type==='back'?w==='tie':w!=='tie';payout=won?(b.type==='back'?b.stake*b.odds:b.stake*2):0;}
      if(isHL&&outcome){const r=outcome.res;if(b.runner==='Higher')won=b.type==='back'?r==='hi':r!=='hi';else if(b.runner==='Lower')won=b.type==='back'?r==='lo':r!=='lo';else if(b.runner==='Equal')won=b.type==='back'?r==='eq':r!=='eq';payout=won?(b.type==='back'?b.stake*b.odds:b.stake*2):0;}
      if(won&&payout>0){try{const r=await fetch(`${API}/api/bet/settle`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,stake:b.stake,payout})});const d=await r.json();if(d.success)setBal(d.newBalance);}catch(e){}addToast(`🏆 WON ₨${payout.toFixed(0)}!`,'win');}
      else if(!won)addToast(`❌ Lost ₨${b.stake}`,'lose');
    });
    setMyBets(p=>p.map(b=>({...b,settled:true})));
  },[phase]);

  return <div className="game-screen">
    <div className="gm-hdr">
      <div className="gm-hdr-left"><TC secs={timer||0} max={MAX[phase]||20}/><div><div className="gm-id"><b>Game #{gid}</b>Balance: ₨{bal.toLocaleString()}</div></div></div>
      <div style={{fontSize:10,color:'rgba(255,255,255,.5)'}}>{gameKey.replace(/_/g,' ').toUpperCase()}</div>
    </div>
    <div className={`phase-banner ${PCLASS[phase]||'pb-wait'}`}>{PNAMES[phase]||'—'}</div>
    <div className="gtabs"><div className={`gtab${gameTab==='game'?' on':''}`} onClick={()=>setGameTab('game')}>Game</div><div className={`gtab${gameTab==='results'?' on':''}`} onClick={()=>setGameTab('results')}>Results</div><div className={`gtab${gameTab==='rules'?' on':''}`} onClick={()=>setGameTab('rules')}>Rules</div></div>

    {gameTab==='game'&&<div className="game-content">
      {isHoldem&&<div className="card-table">
        <div className="ct-label">COMMUNITY CARDS</div>
        <div className="ct-community"><div className="ct-stage">{phase==='wait'||phase==='pre'?'PRE-FLOP':phase==='flop'?'FLOP':phase==='turn'?'TURN':phase==='river'?'RIVER':'BOARD'}</div>
          {(!comm||comm.length===0)&&<span style={{color:'rgba(255,255,255,.2)',fontSize:11}}>Revealed after pre-flop</span>}
          {(comm||[]).map((c,i)=><Card key={i} c={{...c,up:true}} w={34} h={48}/>)}
          {comm&&comm.length>0&&comm.length<5&&Array.from({length:5-comm.length},(_,i)=><div key={i} style={{width:34,height:48,borderRadius:4,background:'rgba(0,0,0,.3)',border:'1px dashed rgba(255,255,255,.1)'}}/>)}
        </div>
        <div className="ct-hands">{(hands||[[],[],[],[]]).map((h,i)=><div key={i} className={`ct-hand${winner&&winner.i===i?' winning':''}`}><div className="ct-hand-lbl">Hand {i+1}{winner&&winner.i===i?' 🏆':''}</div><div className="ct-cards">{(h||[]).map((c,j)=><Card key={j} c={c} w={32} h={46}/>)}</div></div>)}</div>
        {winner&&phase==='result'&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:8,padding:'7px 12px',marginTop:8,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>🏆 Hand {winner.i+1} WINS — {winner.ev?.name||''}</div>}
      </div>}
      {isBac&&<div className="card-table">
        <div style={{display:'grid',gridTemplateColumns:'1fr 40px 1fr',gap:8,alignItems:'center'}}>
          <div className="ct-hand"><div className="ct-hand-lbl">PLAYER</div><div className="ct-cards">{(pH||[]).map((c,i)=><Card key={i} c={c} w={32} h={46}/>)}</div>{phase==='result'&&state.winner&&<div style={{fontSize:22,fontWeight:900,color:'#fff'}}>{state.winner.pv}</div>}</div>
          <div style={{textAlign:'center',color:'rgba(255,255,255,.4)',fontWeight:900,fontSize:16}}>VS</div>
          <div className="ct-hand"><div className="ct-hand-lbl">BANKER</div><div className="ct-cards">{(bH||[]).map((c,i)=><Card key={i} c={c} w={32} h={46}/>)}</div>{phase==='result'&&state.winner&&<div style={{fontSize:22,fontWeight:900,color:'#fff'}}>{state.winner.bv}</div>}</div>
        </div>
        {phase==='result'&&state.winner&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:8,padding:'7px',marginTop:8,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>{state.winner.w==='player'?'🏆 PLAYER WINS':state.winner.w==='banker'?'🏦 BANKER WINS':'🤝 TIE'}</div>}
      </div>}
      {isHL&&<div className="card-table">
        <div style={{display:'flex',justifyContent:'center',gap:20,alignItems:'center',padding:'8px 0'}}>
          <div style={{textAlign:'center'}}><div style={{color:'var(--gold)',fontSize:10,fontWeight:700,marginBottom:5}}>CARD 1</div>{c1&&<Card c={c1}/>}</div>
          <div style={{fontSize:22,color:'rgba(255,255,255,.5)',fontWeight:900}}>→</div>
          <div style={{textAlign:'center'}}><div style={{color:'var(--gold)',fontSize:10,fontWeight:700,marginBottom:5}}>CARD 2</div>{c2&&c2.up?<Card c={c2}/>:<div style={{width:36,height:52,borderRadius:4,background:'rgba(0,0,0,.3)',border:'1px dashed rgba(255,255,255,.15)'}}/>}</div>
        </div>
        {outcome&&<div style={{background:'rgba(255,215,0,.15)',border:'1px solid rgba(255,215,0,.4)',borderRadius:8,padding:'7px',marginTop:4,textAlign:'center',color:'var(--gold)',fontWeight:800,fontSize:13}}>{outcome.res==='hi'?'⬆ HIGHER':outcome.res==='lo'?'⬇ LOWER':'= EQUAL'}</div>}
      </div>}
      {isDerby&&<div style={{background:'linear-gradient(180deg,#1a4010,#0d2808)',padding:'10px 10px 6px',flexShrink:0}}>
        {HN.map((name,i)=>{const pos=(positions||[])[i]||0;const finPos=(raceOrder||[]).indexOf(i)+1;return<div key={i} style={{display:'grid',gridTemplateColumns:'20px 88px 1fr 20px',gap:5,alignItems:'center',padding:'3px 0',borderBottom:'1px dashed rgba(255,255,255,.07)'}}>
          <div style={{width:18,height:18,borderRadius:'50%',background:HC[i],border:'1px solid rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:900,color:HC[i]==='#f0f0f0'||HC[i]==='#f39c12'?'#000':'#fff',flexShrink:0}}>{i+1}</div>
          <div><div style={{color:'#fff',fontSize:10,fontWeight:700,lineHeight:1.2}}>{name}</div><div style={{color:'rgba(255,255,255,.4)',fontSize:8}}>{HJ[i]}</div></div>
          <div style={{background:'rgba(0,0,0,.4)',borderRadius:3,height:18,position:'relative',overflow:'hidden'}}><div style={{position:'absolute',left:0,top:0,bottom:0,width:`${pos}%`,background:`${HC[i]}33`,transition:'width .08s'}}/><div style={{position:'absolute',left:`${Math.min(pos,90)}%`,top:1,fontSize:12,lineHeight:1,transition:'left .08s'}}>🐎</div><div style={{position:'absolute',right:0,top:0,bottom:0,width:2,background:'rgba(255,215,0,.5)'}}/></div>
          <div style={{width:18,height:18,borderRadius:'50%',background:finPos>0?['#FFD700','#C0C0C0','#CD7F32','rgba(255,255,255,.1)','rgba(255,255,255,.1)','rgba(255,255,255,.1)'][finPos-1]:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900,color:'#fff'}}>{finPos>0?finPos:''}</div>
        </div>;})}

// ── AVIATOR GAME ──────────────────────────────────────────────
function AviatorGame({gameKey,avState,bal,setBal,addToast,userId,label='Aviator',color='#00C853'}){
  const [stake,setStake]=useState('200');const [autoCashAt,setAutoCashAt]=useState('');const [hasBet,setHasBet]=useState(false);const [cashedOut,setCashedOut]=useState(false);const [cashMult,setCashMult]=useState(null);const canvasRef=useRef(null);const ptRef=useRef([]);const animRef=useRef(null);
  const s=avState||{phase:'wait',timer:5,multiplier:1,history:[],gid:0};
  useEffect(()=>{if(s.phase==='wait'){ptRef.current=[];cancelAnimationFrame(animRef.current);}
    if(s.phase==='flying'){const step=()=>{const m=s.multiplier;ptRef.current=[...ptRef.current,m].slice(-100);drawCurve(m);animRef.current=requestAnimationFrame(step);};animRef.current=requestAnimationFrame(step);}
    if(s.phase==='crashed'){cancelAnimationFrame(animRef.current);drawCurve(s.multiplier,true);if(hasBet&&!cashedOut){addToast(`💥 Crashed x${s.multiplier} — Lost ₨${stake}`,'lose');setHasBet(false);}if(hasBet&&cashedOut){setHasBet(false);setCashedOut(false);}return()=>cancelAnimationFrame(animRef.current);}
  },[s.phase,s.multiplier]);
  // Auto cashout
  useEffect(()=>{const ac=parseFloat(autoCashAt);if(s.phase==='flying'&&hasBet&&!cashedOut&&ac>1&&s.multiplier>=ac){doCashout();}},[ s.multiplier]);
  function drawCurve(mult,crashed=false){const c=canvasRef.current;if(!c)return;const ctx=c.getContext('2d');const W=c.width=c.offsetWidth||300;const H=c.height=c.offsetHeight||180;ctx.clearRect(0,0,W,H);const col=crashed?'#E53935':color;if(ptRef.current.length<2)return;const pts=ptRef.current;const maxM=Math.max(...pts,mult);const grad=ctx.createLinearGradient(0,H,W,0);grad.addColorStop(0,col+'44');grad.addColorStop(1,'transparent');ctx.beginPath();ctx.moveTo(0,H);pts.forEach((m,i)=>{const x=(i/(pts.length-1||1))*W;const y=H-(((m-1)/(maxM-1||1))*(H*.85));ctx.lineTo(x,y);});ctx.lineTo(W,H);ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.moveTo(0,H);pts.forEach((m,i)=>{const x=(i/(pts.length-1||1))*W;const y=H-(((m-1)/(maxM-1||1))*(H*.85));ctx.lineTo(x,y);});ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.shadowBlur=12;ctx.shadowColor=col;ctx.stroke();ctx.shadowBlur=0;}
  async function placeBet(){const st=Number(stake);if(!st||st<10){addToast('Min stake ₨10','info');return;}if(st>bal){addToast('Insufficient balance','lose');return;}if(s.phase!=='wait'){addToast('Wait for next round','info');return;}
    try{const r=await fetch(`${API}/api/bet/place`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,amount:st,gameKey,runner:'Aviator',betType:'back',odds:1})});const d=await r.json();if(!d.success){addToast(d.error||'Error','lose');return;}setBal(d.newBalance);}catch(e){addToast('Server error','lose');return;}
    setHasBet(true);setCashedOut(false);setCashMult(null);addToast(`✅ Bet ₨${st} placed — waiting for takeoff`,'bet');}
  async function doCashout(){if(!hasBet||cashedOut||s.phase!=='flying')return;const m=s.multiplier;const st=Number(stake);const payout=Math.floor(st*m);setCashedOut(true);setCashMult(m);
    try{const r=await fetch(`${API}/api/bet/settle`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,stake:st,payout})});const d=await r.json();if(d.success)setBal(d.newBalance);}catch(e){}
    addToast(`✈️ Cashed x${m.toFixed(2)} = ₨${payout.toLocaleString()}`,'win');}
  const multColor=s.phase==='crashed'?'#E53935':s.phase==='flying'?color:'#FFD700';
  return <div className="av-screen">
    <div className="av-header">
      <div style={{fontWeight:900,fontSize:14,color:color,letterSpacing:2}}>{label}</div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {(s.history||[]).slice(0,8).map((h,i)=><span key={i} className="av-hist-pill" style={{background:h>=5?'rgba(0,200,83,.12)':h>=2?'rgba(255,215,0,.1)':'rgba(229,57,53,.08)',color:h>=5?'#00e676':h>=2?'#FFD700':'#FF5252',border:`1px solid ${h>=5?'rgba(0,200,83,.3)':h>=2?'rgba(255,215,0,.2)':'rgba(229,57,53,.2)'}`}}>x{h.toFixed(2)}</span>)}
      </div>
    </div>
    <div className="av-canvas-wrap">
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>
      <div className="av-mult-display">
        {s.phase==='wait'&&<div style={{textAlign:'center'}}><div style={{fontFamily:'monospace',fontSize:56,fontWeight:900,color:'#FFD700',textShadow:'0 0 30px rgba(255,215,0,.5)'}}>{s.timer}</div><div style={{fontSize:11,letterSpacing:3,color:'rgba(255,255,255,.4)',marginTop:4}}>NEXT ROUND</div></div>}
        {s.phase!=='wait'&&<>
          <div className="av-mult-num" style={{color:multColor,textShadow:`0 0 40px ${multColor}88`}}>{s.phase==='crashed'?`x${s.crashAt||s.multiplier}`:`x${(s.multiplier||1).toFixed(2)}`}</div>
          <div className="av-mult-lbl">{s.phase==='crashed'?'FLEW AWAY':s.phase==='flying'?'MULTIPLIER':''}</div>

        </>}

    <div className="av-controls">
      <div className="av-ctrl-box">

        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>{[50,100,200,500,1000].map(v=><button key={v} onClick={()=>setStake(v)} disabled={hasBet} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',color:'rgba(255,255,255,.7)',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontSize:11,fontWeight:700}}>₨{v}</button>)}</div>
        {!hasBet&&s.phase==='wait'?<button className="av-bet-btn av-bet-active" onClick={placeBet}>🎰 PLACE BET</button>:hasBet&&s.phase==='wait'?<button className="av-bet-btn av-bet-placed">✅ BET PLACED</button>:<button className="av-bet-btn av-bet-wait" disabled>Wait for round...</button>}

          <input className="av-auto-inp" type="number" value={autoCashAt} onChange={e=>setAutoCashAt(e.target.value)} placeholder="e.g. 2.00" min="1.01" step=".01"/>
        </div>
        {hasBet&&s.phase==='flying'&&!cashedOut&&<button className="av-cashout-btn" onClick={doCashout}>💰 CASH OUT x{(s.multiplier||1).toFixed(2)}<br/><span style={{fontSize:12}}>= ₨{Math.floor(Number(stake)*(s.multiplier||1)).toLocaleString()}</span></button>}
        {hasBet&&cashedOut&&<div style={{background:'rgba(0,200,83,.1)',border:'1px solid rgba(0,200,83,.3)',borderRadius:8,padding:12,textAlign:'center',color:'#00e676',fontWeight:800}}>✅ Cashed x{cashMult?.toFixed(2)}</div>}
        {(!hasBet||!s.phase==='flying')&&!cashedOut&&<div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:8,padding:12,textAlign:'center',color:'rgba(255,255,255,.25)',fontSize:12}}>Place bet first</div>}
      </div>
    </div>
  </div>;

    const placed=valid.map(b=>({...b,placedId:b.id,id:Date.now()+Math.random(),status:'matched',time:new Date().toLocaleTimeString()}));setExBets(p=>[...p,...placed]);setExSlip([]);addToast(`✅ ${placed.length} bet(s) placed`,'bet');

  const totStake=exSlip.reduce((s,b)=>s+(b.stake||0),0);const totPot=exSlip.filter(b=>b.type==='back').reduce((s,b)=>s+(b.stake||0)*(b.odds-1),0);const openBets=exBets.filter(b=>b.status==='matched');const settled=exBets.filter(b=>['won','lost'].includes(b.status));

const LOBBY_TABS=['Lobby',...GAMES.map(g=>g.name)];

function App(){
  const [user,setUser]=useState(null);const [userId,setUserId]=useState(null);const [bal,setBal]=useState(0);
  const [gameStates,setGameStates]=useState({});const [avStates,setAvStates]=useState({});
  const [sportsData,setSportsData]=useState(null);const [lahoreRaces,setLahoreRaces]=useState([]);
  const [wsConn,setWsConn]=useState(false);const [mode,setMode]=useState('lobby');
  const [activeGame,setActiveGame]=useState(null);const [lobTab,setLobTab]=useState('Lobby');
  const [toasts,setToasts]=useState([]);
  const [loginTab,setLoginTab]=useState('in');const [email,setEmail]=useState('');const [pw,setPw]=useState('');
  const [rn,setRn]=useState('');const [re,setRe]=useState('');const [rp,setRp]=useState('');const [lerr,setLerr]=useState('');
  const ws=useRef(null);const reconn=useRef(null);

  function addToast(msg,type='info'){const id=++toastId;setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);}

  function connectWS(){
    if(ws.current&&ws.current.readyState===WebSocket.OPEN)return;
    try{const sock=new WebSocket(WS_URL);
      sock.onopen=()=>{setWsConn(true);clearTimeout(reconn.current);};
      sock.onmessage=e=>{try{const msg=JSON.parse(e.data);
        if(msg.type==='state')setGameStates(p=>({...p,[msg.game]:msg.state}));
        else if(msg.type==='timer')setGameStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),timer:msg.timer,phase:msg.phase}}));
        else if(msg.type==='odds')setGameStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),odds:msg.odds,...(msg.sizes?{sizes:msg.sizes}:{}),...(msg.extraOdds?{extraOdds:msg.extraOdds}:{})}}));
        else if(msg.type==='positions')setGameStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),positions:msg.positions,raceOrder:msg.raceOrder}}));
        else if(msg.type==='sports')setSportsData(msg.data);
        else if(msg.type==='lahore')setLahoreRaces(msg.races||[]);
        else if(msg.type==='av_state')setAvStates(p=>({...p,[msg.game]:msg.state}));
        else if(msg.type==='av_tick')setAvStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),multiplier:msg.multiplier,phase:'flying'}}));
        else if(msg.type==='av_timer')setAvStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),timer:msg.timer,phase:'wait'}}));
        else if(msg.type==='av_crash')setAvStates(p=>({...p,[msg.game]:{...(p[msg.game]||{}),phase:'crashed',crashAt:msg.multiplier,history:msg.history}}));
        else if(msg.type==='bet_rejected')addToast(`❌ ${msg.reason}`,'lose');
      }catch(e){}};
      sock.onclose=()=>{setWsConn(false);ws.current=null;reconn.current=setTimeout(connectWS,3000);};
      sock.onerror=()=>sock.close();
      ws.current=sock;
    }catch(e){reconn.current=setTimeout(connectWS,3000);}
  }
  useEffect(()=>{connectWS();return()=>{clearTimeout(reconn.current);ws.current?.close();};},[]);

  function sendBet(data){if(!ws.current||ws.current.readyState!==WebSocket.OPEN){addToast('Not connected','lose');return;}ws.current.send(JSON.stringify({type:'bet',...data}));}

  async function login(){
    if(!email||!pw){setLerr('Enter email and password');return;}
    try{const r=await fetch(`${API}/api/users/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});const d=await r.json();
      if(d.error){setLerr(d.error);}else{setUser(d.user.name);setUserId(d.user.id);setBal(d.user.balance);addToast(`Welcome back, ${d.user.name}!`,'info');}
    }catch(e){setLerr('Cannot connect to server');}
  }
  async function register(){
    if(!rn||!re||!rp){setLerr('All fields required');return;}
    try{const r=await fetch(`${API}/api/users/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:rn,email:re,password:rp})});const d=await r.json();
      if(d.error){setLerr(d.error);}else{setUser(d.user.name);setUserId(d.user.id);setBal(d.user.balance);addToast('Welcome! Account created. Contact admin to add balance.','info');}
    }catch(e){setLerr('Cannot connect to server');}
  }
  function logout(){setUser(null);setUserId(null);setBal(0);setMode('lobby');setActiveGame(null);}

  const filteredGames=lobTab==='Lobby'?GAMES:GAMES.filter(g=>g.name===lobTab);

  if(!user)return <>
    <div className="login-page"><div className="login-card">
      <div className="l-logo">MOT777</div>
      <div className="l-sub">LIVE CARD GAME EXCHANGE</div>
      <div style={{textAlign:'center',marginBottom:14}}><span className={`ws-badge ${wsConn?'ws-on':'ws-off'}`}>{wsConn?'🟢 Server Connected':'🔴 Connecting...'}</span></div>
      {lerr&&<div className="l-err">⚠️ {lerr}</div>}
      <div className="l-tabs"><div className={`l-tab${loginTab==='in'?' on':''}`} onClick={()=>{setLoginTab('in');setLerr('')}}>SIGN IN</div><div className={`l-tab${loginTab==='up'?' on':''}`} onClick={()=>{setLoginTab('up');setLerr('')}}>REGISTER</div></div>
      {loginTab==='in'?<><input className="l-inp" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address"/><input className="l-inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" onKeyDown={e=>e.key==='Enter'&&login()}/><button className="l-btn" onClick={login}>SIGN IN →</button><div className="l-hint">Demo: ali@test.com / 1234</div></>
      :<><input className="l-inp" value={rn} onChange={e=>setRn(e.target.value)} placeholder="Full name"/><input className="l-inp" value={re} onChange={e=>setRe(e.target.value)} placeholder="Email address"/><input className="l-inp" type="password" value={rp} onChange={e=>setRp(e.target.value)} placeholder="Password"/><button className="l-btn" onClick={register}>CREATE ACCOUNT →</button><div className="l-note">💡 After registering, contact admin to add balance to your account</div></>}
      <div style={{textAlign:'center',marginTop:14,paddingTop:12,borderTop:'1px solid #f0f0f0'}}><a href="/admin.html" style={{color:'#888',fontSize:11,textDecoration:'none',fontWeight:700}}>⚙️ Admin Panel</a></div>
    </div></div>
    <Toasts items={toasts}/>
  </>;

  return <>
    <div className="topbar">
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {mode!=='lobby'&&<button onClick={()=>setMode('lobby')} style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',padding:'0 4px'}}>←</button>}
        <div className="tb-logo"><div className="live-dot"/>MOT777</div>
        <span className={`ws-badge ${wsConn?'ws-on':'ws-off'}`}>{wsConn?'LIVE':'OFFLINE'}</span>
      </div>
      <div className="tb-btns">
        <div className="tb-bal">₨{bal.toLocaleString()}</div>
        <button className="tb-btn" onClick={logout} style={{borderColor:'rgba(255,100,100,.3)',color:'rgba(255,150,150,.75)'}}>EXIT</button>
      </div>
    </div>
    <div className="mode-nav">
      <div className={`mn${mode==='lobby'?' on':''}`} onClick={()=>setMode('lobby')}>🎰 GAMES</div>
      <div className={`mn${mode==='exchange'?' on':''}`} onClick={()=>setMode('exchange')}>📊 EXCHANGE</div>
      <div className={`mn${mode==='lahore'?' on':''}`} onClick={()=>setMode('lahore')}>🏇 LAHORE RACES</div>
      {AV_GAMES.map(id=><div key={id} className={`mn${mode==='game'&&activeGame?.id===id?' on':''}`} onClick={()=>{setActiveGame(GAMES.find(g=>g.id===id));setMode('game');}}>{id==='aviator'?'✈️ Aviator':id==='aviator_turbo'?'⚡ Aviator Turbo':'💎 Aviator VIP'}</div>)}
    </div>

    {mode==='lobby'&&<>
      <div className="lobby-tabs">{LOBBY_TABS.map(t=><button key={t} className={`lt${lobTab===t?' on':''}`} onClick={()=>setLobTab(t)}>{t}</button>)}</div>
      <div className="lobby-grid">{filteredGames.map(g=><div key={g.id} className="game-tile" onClick={()=>{setActiveGame(g);setMode('game');}}>
        <div className="gt-art" style={{background:`linear-gradient(135deg,${g.bg},${g.bg}cc)`}}><span style={{fontSize:48}}>{g.art}</span><div className="gt-play">▶</div></div>
        {g.hot&&<div className="gt-hot">HOT</div>}
        <div className="gt-name">{g.name}</div>
      </div>)}</div>
      {!wsConn&&<div style={{background:'#ffebee',border:'1px solid #ef9a9a',borderRadius:8,padding:'12px 16px',margin:'12px',fontSize:13,color:'#b71c1c'}}>⚠️ <b>Not connected to server.</b> Make sure server.js is running.<br/><span style={{fontSize:11}}>Run: <code>npm install && node server.js</code></span></div>}
    </>}

    {mode==='game'&&activeGame&&<>
      {AV_GAMES.includes(activeGame.id)&&<AviatorGame gameKey={activeGame.id} avState={avStates[activeGame.id]} bal={bal} setBal={setBal} addToast={addToast} userId={userId} label={activeGame.name} color={activeGame.id==='aviator_vip'?'#FFD700':activeGame.id==='aviator_turbo'?'#FF6D00':'#00C853'}/>}
      {!AV_GAMES.includes(activeGame.id)&&<GameView gameKey={activeGame.id} state={gameStates[activeGame.id]} sendBet={sendBet} bal={bal} setBal={setBal} addToast={addToast} userId={userId}/>}
    </>}

    {mode==='exchange'&&<ExchangeView sports={sportsData} bal={bal} setBal={setBal} addToast={addToast} userId={userId}/>}
    {mode==='lahore'&&<LahoreRacing lahoreRaces={lahoreRaces} bal={bal} setBal={setBal} addToast={addToast} userId={userId}/>}

    <Toasts items={toasts}/>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
